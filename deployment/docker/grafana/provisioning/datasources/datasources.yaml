apiVersion: 1

datasources:
  # =========================================================================
  # Global Datasources — unified hot+cold via multi-level select
  # =========================================================================

  - name: "VictoriaLogs Global (Hot+Cold)"
    type: victoriametrics-logs-datasource
    uid: victorialogs-global
    access: proxy
    url: http://vlselect:9428
    isDefault: true
    jsonData:
      maxLines: 1000

  - name: "VictoriaTraces Global (Hot+Cold)"
    type: jaeger
    uid: victoriatraces-global
    access: proxy
    url: http://vtselect:10428
    jsonData:
      tracesToLogsV2:
        datasourceUid: victorialogs-global
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # =========================================================================
  # Hot Tier — disk-based, 24h retention
  # =========================================================================

  - name: "VictoriaLogs Hot (Disk 24h)"
    type: victoriametrics-logs-datasource
    uid: victorialogs-hot
    access: proxy
    url: http://victorialogs:9428
    jsonData:
      maxLines: 1000

  - name: "VictoriaTraces Hot (Disk 24h)"
    type: jaeger
    uid: victoriatraces-hot
    access: proxy
    url: http://victoriatraces:10428
    jsonData:
      tracesToLogsV2:
        datasourceUid: victorialogs-hot
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # =========================================================================
  # Cold Tier — S3 Parquet via lakehouse
  # =========================================================================

  - name: "Lakehouse Logs Cold (S3)"
    type: victoriametrics-logs-datasource
    uid: victoria-lakehouse-cold
    access: proxy
    url: http://lakehouse-logs:9428
    jsonData:
      maxLines: 1000

  - name: "Lakehouse Traces Cold (S3 Jaeger)"
    type: jaeger
    uid: victoria-lakehouse-traces
    access: proxy
    url: http://lakehouse-traces:10428
    jsonData:
      tracesToLogsV2:
        datasourceUid: victoria-lakehouse-cold
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # =========================================================================
  # Loki API — hot+cold routing via loki-vl-proxy
  # =========================================================================

  - name: "Loki via Proxy (Hot+Cold)"
    type: loki
    uid: loki-vl-proxy
    access: proxy
    url: http://loki-vl-proxy:3100
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: victoriatraces-global
          matcherRegex: "trace_id=(\\w+)"
          name: traceID
          url: "$${__value.raw}"

  # =========================================================================
  # ClickHouse — OTEL-compatible logs and traces from S3 Parquet
  # =========================================================================

  - name: "ClickHouse Analytics (S3 Parquet SQL)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-analytics
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      defaultTable: logs_raw

  - name: "ClickHouse Logs (OTEL S3 Parquet)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-logs
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      defaultTable: otel_logs
      otelEnabled: true
      otelVersion: latest
      logsTable: otel_logs
      logsTimestamp: Timestamp
      logsSeverityTextField: SeverityText
      logsSeverityNumberField: SeverityNumber
      logsBodyField: Body
      logsTimeField: Timestamp
      logsLevelField: SeverityText
      logsServiceNameField: ServiceName
      logsTraceIdField: TraceId
      logsSpanIdField: SpanId
      logsResourceAttributeField: ResourceAttributes
      logsLogAttributeField: LogAttributes
      logsScopeAttributeField: ScopeAttributes
      logsScopeNameField: ScopeName
      tracesToLogsV2:
        datasourceUid: clickhouse-traces
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  - name: "ClickHouse Traces (OTEL S3 Parquet)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-traces
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      defaultTable: otel_traces
      otelEnabled: true
      otelVersion: latest
      tracesTable: otel_traces
      tracesTimestamp: Timestamp
      tracesDurationField: Duration
      tracesDurationUnit: ns
      tracesTraceIdField: TraceId
      tracesSpanIdField: SpanId
      tracesParentSpanIdField: ParentSpanId
      tracesServiceNameField: ServiceName
      tracesOperationNameField: SpanName
      tracesStatusCodeField: StatusCode
      tracesStatusMessageField: StatusMessage
      tracesSpanKindField: SpanKind
      tracesTraceStateField: TraceState
      tracesResourceAttributeField: ResourceAttributes
      tracesSpanAttributeField: SpanAttributes
      tracesScopeAttributeField: ScopeAttributes
      tracesScopeNameField: ScopeName
      tracesEventsTimestampField: Events.Timestamp
      tracesEventsNameField: Events.Name
      tracesEventsAttributeField: Events.Attributes
      tracesLinksTraceIdField: Links.TraceId
      tracesLinksSpanIdField: Links.SpanId
      tracesToLogsV2:
        datasourceUid: clickhouse-logs
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
