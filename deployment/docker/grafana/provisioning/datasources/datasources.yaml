apiVersion: 1

deleteDatasources:
  - name: "Tempo via VictoriaTraces (Hot+Cold)"
    orgId: 1

datasources:
  # =========================================================================
  # Global Datasources — unified hot+cold via multi-level select
  # =========================================================================

  - name: "VictoriaLogs Global (Hot+Cold)"
    type: victoriametrics-logs-datasource
    uid: victorialogs-global
    access: proxy
    url: http://vlselect:9428
    isDefault: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: victoriatraces-global
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  - name: "VictoriaTraces Global (Hot+Cold)"
    type: jaeger
    uid: victoriatraces-global
    access: proxy
    url: http://vtselect:10428/select/jaeger
    jsonData:
      tracesToLogsV2:
        datasourceUid: victorialogs-global
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # =========================================================================
  # Hot Tier — disk-based, 24h retention
  # =========================================================================

  - name: "VictoriaLogs Hot (Disk 24h)"
    type: victoriametrics-logs-datasource
    uid: victorialogs-hot
    access: proxy
    url: http://victorialogs:9428
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: victoriatraces-hot
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  - name: "VictoriaTraces Hot (Disk 24h)"
    type: jaeger
    uid: victoriatraces-hot
    access: proxy
    url: http://victoriatraces:10428/select/jaeger
    jsonData:
      tracesToLogsV2:
        datasourceUid: victorialogs-hot
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # =========================================================================
  # Cold Tier — S3 Parquet via lakehouse
  # =========================================================================

  - name: "Lakehouse Logs Cold (S3)"
    type: victoriametrics-logs-datasource
    uid: victoria-lakehouse-cold
    access: proxy
    url: http://lakehouse-logs:9428
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: victoria-lakehouse-traces
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  - name: "Lakehouse Traces Cold (S3 Jaeger)"
    type: jaeger
    uid: victoria-lakehouse-traces
    access: proxy
    url: http://lakehouse-traces:10428
    jsonData:
      tracesToLogsV2:
        datasourceUid: victoria-lakehouse-cold
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # =========================================================================
  # Loki API — hot+cold routing via loki-vl-proxy
  # =========================================================================

  - name: "Loki via Proxy (Hot+Cold)"
    type: loki
    uid: loki-vl-proxy
    access: proxy
    url: http://loki-vl-proxy:3100
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: victoriatraces-global
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  # =========================================================================
  # ClickHouse — OTEL-compatible logs and traces from S3 Parquet
  # =========================================================================

  - name: "ClickHouse Analytics (S3 Parquet SQL)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-analytics
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      defaultTable: logs_raw

  - name: "ClickHouse Logs (S3 Parquet)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-logs
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      defaultTable: otel_logs
      logs:
        defaultDatabase: lakehouse
        defaultTable: otel_logs
        otelEnabled: true
        otelVersion: latest
        timeColumn: Timestamp
        levelColumn: SeverityText
        messageColumn: Body

  - name: "ClickHouse Traces (S3 Parquet)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-traces
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      defaultTable: otel_traces
      traces:
        defaultDatabase: lakehouse
        defaultTable: otel_traces
        otelEnabled: true
        otelVersion: latest
        traceIdColumn: TraceId
        spanIdColumn: SpanId
        parentSpanIdColumn: ParentSpanId
        serviceNameColumn: ServiceName
        operationNameColumn: SpanName
        startTimeColumn: Timestamp
        durationColumn: Duration
        durationUnit: ns
        tagsColumn: SpanAttributes
        serviceTagsColumn: ResourceAttributes
        kindColumn: SpanKind
        statusCodeColumn: StatusCode
        statusMessageColumn: StatusMessage
        stateColumn: TraceState
        instrumentationLibraryNameColumn: ScopeName
        instrumentationLibraryVersionColumn: ScopeVersion
        traceEventsColumnPrefix: Events
        traceLinksColumnPrefix: Links
      tracesToLogsV2:
        datasourceUid: clickhouse-logs
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
