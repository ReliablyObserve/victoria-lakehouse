apiVersion: 1

datasources:
  # =========================================================================
  # Global Datasources — unified hot+cold via multi-level select
  # =========================================================================

  - name: "VictoriaLogs Global (Hot+Cold)"
    type: victoriametrics-logs-datasource
    uid: victorialogs-global
    access: proxy
    url: http://vlselect:9428
    isDefault: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: victoriatraces-global
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  - name: "VictoriaTraces Global (Hot+Cold)"
    type: jaeger
    uid: victoriatraces-global
    access: proxy
    url: http://vtselect:10428/select/jaeger
    jsonData:
      tracesToLogsV2:
        datasourceUid: victorialogs-global
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
      nodeGraph:
        # Per-trace Node Graph derived from parent/child span links
        # in the returned trace data — no extra endpoint required.
        enabled: true

  # =========================================================================
  # Hot Tier — disk-based, 24h retention
  # =========================================================================

  - name: "VictoriaLogs Hot (Disk 24h)"
    type: victoriametrics-logs-datasource
    uid: victorialogs-hot
    access: proxy
    url: http://victorialogs:9428
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: victoriatraces-hot
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  - name: "VictoriaTraces Hot (Disk 24h)"
    type: jaeger
    uid: victoriatraces-hot
    access: proxy
    url: http://victoriatraces:10428/select/jaeger
    jsonData:
      tracesToLogsV2:
        datasourceUid: victorialogs-hot
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
      nodeGraph:
        enabled: true

  # =========================================================================
  # Cold Tier — S3 Parquet via lakehouse
  # =========================================================================

  - name: "Lakehouse Logs Cold (S3)"
    type: victoriametrics-logs-datasource
    uid: victoria-lakehouse-cold
    access: proxy
    url: http://lakehouse-logs:9428
    jsonData:
      maxLines: 1000
      derivedFields:
        # Cold-only stays cold-only — trace-id clicks from Lakehouse Logs
        # (S3) resolve against Lakehouse Traces (S3 Jaeger). Trace IDs
        # newer than the cold flush interval (~2 min) will be "not found"
        # by design; use the global VL+VT datasources for hot-or-cold
        # fan-out. Upstream VT's documented trace-by-ID endpoint is the
        # Jaeger one (/select/jaeger/api/traces/<id>).
        - datasourceUid: victoria-lakehouse-traces
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  - name: "Lakehouse Traces Cold (S3 Jaeger)"
    type: jaeger
    uid: victoria-lakehouse-traces
    access: proxy
    # /select/jaeger prefix matches VT/LH's actual Jaeger HTTP API
    # mount point. Without it the Grafana plugin hits /api/services
    # against the bare port and lakehouse-traces returns 404 — which
    # is what the cold-trace datasource was doing in Grafana (the
    # Jaeger UI nginx leg was fine, but the in-Grafana plugin hit
    # the wrong path). Mirrors the hot/global Jaeger entries below.
    url: http://lakehouse-traces:10428/select/jaeger
    jsonData:
      tracesToLogsV2:
        datasourceUid: victoria-lakehouse-cold
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
      nodeGraph:
        enabled: true

  # =========================================================================
  # Tempo API — backed by VictoriaTraces for Loki→trace correlation
  # =========================================================================

  # VT-Tempo datasource hardening (applies to all three Tempo entries below):
  #   * nodeGraph.enabled=false   — VT exposes no service-graph endpoint, so
  #                                 the Tempo plugin would otherwise issue 404
  #                                 /api/node-graph requests on every trace view.
  #   * serviceMap omitted        — leaving datasourceUid empty triggers
  #                                 phantom /api/metrics calls from the plugin.
  #   * streamingEnabled.{search,query}=false — VT has no Tempo gRPC stream-
  #                                 over-http surface; the plugin would log
  #                                 stream-connect errors on every search.
  #   * spanBar.type="None"       — parity with the Jaeger sibling datasources
  #                                 so opening a trace from a Loki/VL log line
  #                                 renders identically regardless of which
  #                                 path Grafana resolves it through.

  - name: "Tempo via VictoriaTraces (Hot+Cold)"
    type: tempo
    uid: tempo-global
    access: proxy
    url: http://vtselect:10428/select/tempo
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki-vl-proxy
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
      nodeGraph:
        # Node Graph view (per-trace span graph) derives the graph
        # from each trace's parent-child relationships in the
        # returned span data — no separate VT/Tempo endpoint
        # required. Safe to enable on both hot VT and LH cold
        # because both return full span trees with parent_span_id.
        enabled: true
      streamingEnabled:
        search: false
        query: false
      # Default search result limit — Grafana's Tempo plugin caps
      # at 20 unless overridden here. Operators reported ClickHouse
      # views show many more rows; matching that for parity.
      # Grafana >= 11 accepts up to 9999.
      search:
        defaultLimit: 100
      spanBar:
        type: "None"
      # ServiceMap datasource UID dismisses the Tempo plugin's
      # "No service graph datasource selected" error. The Tempo
      # Service Graph view reads `traces_service_graph_*` Prometheus
      # metrics from this datasource; cold-tier doesn't synthesize
      # them yet (see docs/parity-and-gaps.md — the Service Graph
      # gap is closed for the Jaeger Dependencies view but the
      # Tempo plugin's Service Graph view still needs a metrics
      # bridge). For now the graph renders empty rather than erroring.
      serviceMap:
        datasourceUid: victoriametrics-metrics

  - name: "Tempo VT Hot (Disk 24h)"
    type: tempo
    uid: tempo-vt-hot
    access: proxy
    url: http://victoriatraces:10428/select/tempo
    jsonData:
      # Tempo plugin → Loki plugin pairing. The View Logs button on a
      # trace detail panel resolves against the Loki Hot+Cold proxy so
      # the round-trip stays inside the Tempo↔Loki ecosystem. The
      # parallel VL→Jaeger pairing is preserved on the Jaeger datasources.
      tracesToLogsV2:
        datasourceUid: loki-vl-proxy
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
      nodeGraph:
        # Node Graph view (per-trace span graph) derives the graph
        # from each trace's parent-child relationships in the
        # returned span data — no separate VT/Tempo endpoint
        # required. Safe to enable on both hot VT and LH cold
        # because both return full span trees with parent_span_id.
        enabled: true
      streamingEnabled:
        search: false
        query: false
      # Default search result limit — Grafana's Tempo plugin caps
      # at 20 unless overridden here. Operators reported ClickHouse
      # views show many more rows; matching that for parity.
      # Grafana >= 11 accepts up to 9999.
      search:
        defaultLimit: 100
      spanBar:
        type: "None"
      # ServiceMap datasource UID dismisses the Tempo plugin's
      # "No service graph datasource selected" error. The Tempo
      # Service Graph view reads `traces_service_graph_*` Prometheus
      # metrics from this datasource; cold-tier doesn't synthesize
      # them yet (see docs/parity-and-gaps.md — the Service Graph
      # gap is closed for the Jaeger Dependencies view but the
      # Tempo plugin's Service Graph view still needs a metrics
      # bridge). For now the graph renders empty rather than erroring.
      serviceMap:
        datasourceUid: victoriametrics-metrics

  - name: "Tempo LH Cold (S3 Parquet)"
    type: tempo
    uid: tempo-lh-cold
    access: proxy
    url: http://lakehouse-traces:10428/select/tempo
    jsonData:
      # Pure cold-tier Tempo↔Loki pairing. View Logs from a cold trace
      # resolves against the Loki Cold-Only proxy so the click stays on
      # cold storage end-to-end (no accidental hot fan-out).
      tracesToLogsV2:
        datasourceUid: loki-vl-proxy-cold
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
      nodeGraph:
        # Node Graph view (per-trace span graph) derives the graph
        # from each trace's parent-child relationships in the
        # returned span data — no separate VT/Tempo endpoint
        # required. Safe to enable on both hot VT and LH cold
        # because both return full span trees with parent_span_id.
        enabled: true
      streamingEnabled:
        search: false
        query: false
      # Default search result limit — Grafana's Tempo plugin caps
      # at 20 unless overridden here. Operators reported ClickHouse
      # views show many more rows; matching that for parity.
      # Grafana >= 11 accepts up to 9999.
      search:
        defaultLimit: 100
      spanBar:
        type: "None"
      # ServiceMap datasource UID dismisses the Tempo plugin's
      # "No service graph datasource selected" error. The Tempo
      # Service Graph view reads `traces_service_graph_*` Prometheus
      # metrics from this datasource; cold-tier doesn't synthesize
      # them yet (see docs/parity-and-gaps.md — the Service Graph
      # gap is closed for the Jaeger Dependencies view but the
      # Tempo plugin's Service Graph view still needs a metrics
      # bridge). For now the graph renders empty rather than erroring.
      serviceMap:
        datasourceUid: victoriametrics-metrics

  # =========================================================================
  # Loki API — hot+cold routing via loki-vl-proxy
  # =========================================================================

  - name: "Loki via Proxy (Hot+Cold)"
    type: loki
    uid: loki-vl-proxy
    access: proxy
    url: http://loki-vl-proxy:3100
    jsonData:
      maxLines: 1000
      derivedFields:
        # Route trace_id clicks to Tempo VT Hot. The hot-tier Tempo path was
        # not viable before VictoriaTraces v0.9.2 — earlier releases leaked
        # trace_id_idx_stream entries into search results, returning empty
        # trace_id values and breaking Grafana's "View Trace" affordance.
        # v0.9.2 fixes that (release note: "exclude unnecessary streams
        # during trace search"), so the Tempo /api/v2/traces/<id> path now
        # returns real spans from hot tier.
        - datasourceUid: tempo-vt-hot
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  - name: "Loki via Proxy (Cold Only)"
    type: loki
    uid: loki-vl-proxy-cold
    access: proxy
    url: http://loki-vl-proxy-cold:3100
    jsonData:
      maxLines: 1000
      derivedFields:
        # Cold-tier trace_id clicks drilldown to Tempo on Lakehouse cold.
        # Lakehouse-traces serves /select/tempo/api/v2/traces/<id> from the
        # embedded `_trace_idx` Parquet footer index added in PR #105 — the
        # lookup never opens a row group, so cold-tier drilldown latency
        # matches hot. Pure-tier alignment preserved: cold log → cold trace.
        - datasourceUid: tempo-lh-cold
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  # =========================================================================
  # ClickHouse — OTEL-compatible logs and traces from S3 Parquet
  # =========================================================================

  - name: "ClickHouse Analytics (S3 Parquet SQL)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-analytics
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      defaultTable: logs_raw

  - name: "ClickHouse OTEL (Logs+Traces)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-otel
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      logs:
        defaultDatabase: lakehouse
        defaultTable: otel_logs
        otelEnabled: true
        otelVersion: latest
        timeColumn: Timestamp
        levelColumn: SeverityText
        messageColumn: Body
      traces:
        defaultDatabase: lakehouse
        defaultTable: otel_traces
        otelEnabled: true
        otelVersion: latest
        durationUnit: ns
        traceIdColumn: TraceId
        spanIdColumn: SpanId
        parentSpanIdColumn: ParentSpanId
        serviceNameColumn: ServiceName
        operationNameColumn: SpanName
        startTimeColumn: Timestamp
        durationColumn: Duration
        tagsColumn: SpanAttributes
        serviceTagsColumn: ResourceAttributes
        kindColumn: SpanKind
        statusCodeColumn: StatusCode
        statusMessageColumn: StatusMessage
        stateColumn: TraceState
        instrumentationLibraryNameColumn: ScopeName
        instrumentationLibraryVersionColumn: ScopeVersion

  - name: "ClickHouse Logs (S3 Parquet)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-logs
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      defaultTable: otel_logs
      logs:
        defaultDatabase: lakehouse
        defaultTable: otel_logs
        otelEnabled: true
        otelVersion: latest
        timeColumn: Timestamp
        levelColumn: SeverityText
        messageColumn: Body
      traces:
        defaultDatabase: lakehouse
        defaultTable: otel_traces
        otelEnabled: true
        otelVersion: latest
        durationUnit: ns
        traceIdColumn: TraceId
        spanIdColumn: SpanId
        parentSpanIdColumn: ParentSpanId
        serviceNameColumn: ServiceName
        operationNameColumn: SpanName
        startTimeColumn: Timestamp
        durationColumn: Duration
        tagsColumn: SpanAttributes
        serviceTagsColumn: ResourceAttributes
        kindColumn: SpanKind
        statusCodeColumn: StatusCode
        statusMessageColumn: StatusMessage
        stateColumn: TraceState
        instrumentationLibraryNameColumn: ScopeName
        instrumentationLibraryVersionColumn: ScopeVersion

  - name: "ClickHouse Traces (S3 Parquet)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-traces
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      defaultTable: otel_traces
      logs:
        defaultDatabase: lakehouse
        defaultTable: otel_logs
        otelEnabled: true
        otelVersion: latest
        timeColumn: Timestamp
        levelColumn: SeverityText
        messageColumn: Body
      traces:
        defaultDatabase: lakehouse
        defaultTable: otel_traces
        otelEnabled: true
        otelVersion: latest
        durationUnit: ns
        traceIdColumn: TraceId
        spanIdColumn: SpanId
        parentSpanIdColumn: ParentSpanId
        serviceNameColumn: ServiceName
        operationNameColumn: SpanName
        startTimeColumn: Timestamp
        durationColumn: Duration
        tagsColumn: SpanAttributes
        serviceTagsColumn: ResourceAttributes
        kindColumn: SpanKind
        statusCodeColumn: StatusCode
        statusMessageColumn: StatusMessage
        stateColumn: TraceState
        instrumentationLibraryNameColumn: ScopeName
        instrumentationLibraryVersionColumn: ScopeVersion
      tracesToLogsV2:
        datasourceUid: clickhouse-otel
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # =========================================================================
  # VictoriaMetrics — scrapes lakehouse metrics for operational dashboards
  # =========================================================================

  - name: "VictoriaMetrics (Metrics)"
    type: prometheus
    uid: victoriametrics-metrics
    access: proxy
    url: http://victoriametrics:8428
    jsonData:
      httpMethod: POST
      timeInterval: 15s
