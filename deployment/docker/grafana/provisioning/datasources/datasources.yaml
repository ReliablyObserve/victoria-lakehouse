apiVersion: 1

datasources:
  # =========================================================================
  # Global Datasources — unified hot+cold via multi-level select
  # =========================================================================

  - name: "VictoriaLogs Global (Hot+Cold)"
    type: victoriametrics-logs-datasource
    uid: victorialogs-global
    access: proxy
    url: http://vlselect:9428
    isDefault: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: victoriatraces-global
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  - name: "VictoriaTraces Global (Hot+Cold)"
    type: jaeger
    uid: victoriatraces-global
    access: proxy
    url: http://vtselect:10428/select/jaeger
    jsonData:
      tracesToLogsV2:
        datasourceUid: victorialogs-global
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # =========================================================================
  # Hot Tier — disk-based, 24h retention
  # =========================================================================

  - name: "VictoriaLogs Hot (Disk 24h)"
    type: victoriametrics-logs-datasource
    uid: victorialogs-hot
    access: proxy
    url: http://victorialogs:9428
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: victoriatraces-hot
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  - name: "VictoriaTraces Hot (Disk 24h)"
    type: jaeger
    uid: victoriatraces-hot
    access: proxy
    url: http://victoriatraces:10428/select/jaeger
    jsonData:
      tracesToLogsV2:
        datasourceUid: victorialogs-hot
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # =========================================================================
  # Cold Tier — S3 Parquet via lakehouse
  # =========================================================================

  - name: "Lakehouse Logs Cold (S3)"
    type: victoriametrics-logs-datasource
    uid: victoria-lakehouse-cold
    access: proxy
    url: http://lakehouse-logs:9428
    jsonData:
      maxLines: 1000
      derivedFields:
        # Cold-only stays cold-only — trace-id clicks from Lakehouse Logs
        # (S3) resolve against Lakehouse Traces (S3 Jaeger). Trace IDs
        # newer than the cold flush interval (~2 min) will be "not found"
        # by design; use the global VL+VT datasources for hot-or-cold
        # fan-out. Upstream VT's documented trace-by-ID endpoint is the
        # Jaeger one (/select/jaeger/api/traces/<id>).
        - datasourceUid: victoria-lakehouse-traces
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  - name: "Lakehouse Traces Cold (S3 Jaeger)"
    type: jaeger
    uid: victoria-lakehouse-traces
    access: proxy
    url: http://lakehouse-traces:10428
    jsonData:
      tracesToLogsV2:
        datasourceUid: victoria-lakehouse-cold
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # =========================================================================
  # Tempo API — backed by VictoriaTraces for Loki→trace correlation
  # =========================================================================

  - name: "Tempo via VictoriaTraces (Hot+Cold)"
    type: tempo
    uid: tempo-global
    access: proxy
    url: http://vtselect:10428/select/tempo
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki-vl-proxy
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  - name: "Tempo VT Hot (Disk 24h)"
    type: tempo
    uid: tempo-vt-hot
    access: proxy
    url: http://victoriatraces:10428/select/tempo
    jsonData:
      tracesToLogsV2:
        datasourceUid: victorialogs-hot
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  - name: "Tempo LH Cold (S3 Parquet)"
    type: tempo
    uid: tempo-lh-cold
    access: proxy
    url: http://lakehouse-traces:10428/select/tempo
    jsonData:
      tracesToLogsV2:
        datasourceUid: victoria-lakehouse-cold
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # =========================================================================
  # Loki API — hot+cold routing via loki-vl-proxy
  # =========================================================================

  - name: "Loki via Proxy (Hot+Cold)"
    type: loki
    uid: loki-vl-proxy
    access: proxy
    url: http://loki-vl-proxy:3100
    jsonData:
      maxLines: 1000
      derivedFields:
        # Route trace_id clicks to the Jaeger fan-out (hot+cold) instead of
        # Tempo. Upstream VictoriaTraces only routes the v2 path
        # /select/tempo/api/v2/traces/<id>; Grafana's Tempo datasource sends
        # the v1 path /api/traces/<id> for "View Trace", so the lookup
        # returns HTTP 200 / 0 bytes against Tempo. The upstream-documented
        # trace-by-ID endpoint is the Jaeger one
        # (/select/jaeger/api/traces/<id>), which works in both hot and cold
        # tiers.
        - datasourceUid: victoriatraces-global
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  - name: "Loki via Proxy (Cold Only)"
    type: loki
    uid: loki-vl-proxy-cold
    access: proxy
    url: http://loki-vl-proxy-cold:3100
    jsonData:
      maxLines: 1000
      derivedFields:
        # Cold-only stays cold-only — trace-id clicks resolve against the
        # Lakehouse Jaeger datasource (S3 Parquet cold tier). Use a global
        # datasource if you want hot fan-out for fresh trace IDs. Upstream
        # VT's documented trace-by-ID endpoint is the Jaeger one
        # (/select/jaeger/api/traces/<id>) — Tempo's v1 path is not routed
        # by upstream VT, only /api/v2/traces/<id> is.
        - datasourceUid: victoria-lakehouse-traces
          matcherRegex: 'trace_id=(\w+)'
          name: traceID
          url: "$${__value.raw}"

  # =========================================================================
  # ClickHouse — OTEL-compatible logs and traces from S3 Parquet
  # =========================================================================

  - name: "ClickHouse Analytics (S3 Parquet SQL)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-analytics
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      defaultTable: logs_raw

  - name: "ClickHouse OTEL (Logs+Traces)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-otel
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      logs:
        defaultDatabase: lakehouse
        defaultTable: otel_logs
        otelEnabled: true
        otelVersion: latest
        timeColumn: Timestamp
        levelColumn: SeverityText
        messageColumn: Body
      traces:
        defaultDatabase: lakehouse
        defaultTable: otel_traces
        otelEnabled: true
        otelVersion: latest
        durationUnit: ns
        traceIdColumn: TraceId
        spanIdColumn: SpanId
        parentSpanIdColumn: ParentSpanId
        serviceNameColumn: ServiceName
        operationNameColumn: SpanName
        startTimeColumn: Timestamp
        durationColumn: Duration
        tagsColumn: SpanAttributes
        serviceTagsColumn: ResourceAttributes
        kindColumn: SpanKind
        statusCodeColumn: StatusCode
        statusMessageColumn: StatusMessage
        stateColumn: TraceState
        instrumentationLibraryNameColumn: ScopeName
        instrumentationLibraryVersionColumn: ScopeVersion

  - name: "ClickHouse Logs (S3 Parquet)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-logs
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      defaultTable: otel_logs
      logs:
        defaultDatabase: lakehouse
        defaultTable: otel_logs
        otelEnabled: true
        otelVersion: latest
        timeColumn: Timestamp
        levelColumn: SeverityText
        messageColumn: Body
      traces:
        defaultDatabase: lakehouse
        defaultTable: otel_traces
        otelEnabled: true
        otelVersion: latest
        durationUnit: ns
        traceIdColumn: TraceId
        spanIdColumn: SpanId
        parentSpanIdColumn: ParentSpanId
        serviceNameColumn: ServiceName
        operationNameColumn: SpanName
        startTimeColumn: Timestamp
        durationColumn: Duration
        tagsColumn: SpanAttributes
        serviceTagsColumn: ResourceAttributes
        kindColumn: SpanKind
        statusCodeColumn: StatusCode
        statusMessageColumn: StatusMessage
        stateColumn: TraceState
        instrumentationLibraryNameColumn: ScopeName
        instrumentationLibraryVersionColumn: ScopeVersion

  - name: "ClickHouse Traces (S3 Parquet)"
    type: grafana-clickhouse-datasource
    uid: clickhouse-traces
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: default
      defaultDatabase: lakehouse
      defaultTable: otel_traces
      logs:
        defaultDatabase: lakehouse
        defaultTable: otel_logs
        otelEnabled: true
        otelVersion: latest
        timeColumn: Timestamp
        levelColumn: SeverityText
        messageColumn: Body
      traces:
        defaultDatabase: lakehouse
        defaultTable: otel_traces
        otelEnabled: true
        otelVersion: latest
        durationUnit: ns
        traceIdColumn: TraceId
        spanIdColumn: SpanId
        parentSpanIdColumn: ParentSpanId
        serviceNameColumn: ServiceName
        operationNameColumn: SpanName
        startTimeColumn: Timestamp
        durationColumn: Duration
        tagsColumn: SpanAttributes
        serviceTagsColumn: ResourceAttributes
        kindColumn: SpanKind
        statusCodeColumn: StatusCode
        statusMessageColumn: StatusMessage
        stateColumn: TraceState
        instrumentationLibraryNameColumn: ScopeName
        instrumentationLibraryVersionColumn: ScopeVersion
      tracesToLogsV2:
        datasourceUid: clickhouse-otel
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # =========================================================================
  # VictoriaMetrics — scrapes lakehouse metrics for operational dashboards
  # =========================================================================

  - name: "VictoriaMetrics (Metrics)"
    type: prometheus
    uid: victoriametrics-metrics
    access: proxy
    url: http://victoriametrics:8428
    jsonData:
      httpMethod: POST
      timeInterval: 15s
