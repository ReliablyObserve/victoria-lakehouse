# =============================================================================
# Cluster override — layers a 3-instance lakehouse-logs gossip cluster on top
# of docker-compose-e2e.yml. Apply with BOTH files:
#
#   docker compose -p victoria-lakehouse \
#     -f deployment/docker/docker-compose-e2e.yml \
#     -f deployment/docker/docker-compose-cluster.override.yml \
#     up -d --no-deps lakehouse-logs lakehouse-logs-2 lakehouse-logs-3
#
# What it does:
#   - Re-declares lakehouse-logs (instance 1) to: (a) carry the shared network
#     ALIAS `lakehouse-logs-cluster` so Docker embedded DNS resolves it — along
#     with the two new instances — to all three container IPs, and (b) mount the
#     cluster config (which adds discovery.peer_headless_service + peer.auth_key)
#     instead of the plain e2e config. Its ports/image/build/command/env are
#     kept identical to the e2e definition (compose deep-merges these; the
#     command list is replaced wholesale by the anchor so it stays in sync).
#   - Adds lakehouse-logs-2 and lakehouse-logs-3: same image, same command, same
#     cluster config + alias, distinct host ports (29429, 29430) and AZ labels.
#
# All three share the EXISTING lakehouse-net, minio (via s3-latency), the
# obs-archive bucket, and the running datagen-continuous — so all three ingest
# and serve the same data. No image rebuild: instances 2/3 pin the prebuilt
# `victoria-lakehouse-lakehouse-logs:latest` (instance 1 keeps its e2e build).
# =============================================================================

services:
  # Instance 1 — re-declared so it joins the cluster (alias + cluster config).
  # &logs-cluster-base captures the fields the other two instances reuse
  # verbatim (image, command, env-shape, alias, config volume, healthcheck,
  # resource limits). Per-instance bits (ports, AZ, instance-1's build) are set
  # outside the anchor.
  lakehouse-logs: &logs-cluster-base
    image: victoria-lakehouse-lakehouse-logs:latest
    depends_on:
      minio-init:
        condition: service_completed_successfully
      s3-latency:
        condition: service_healthy
    networks:
      lakehouse-net:
        aliases:
          - lakehouse-logs-cluster
    environment:
      LAKEHOUSE_AZ: "az-a"
    command:
      - "-lakehouse.s3.bucket=obs-archive"
      - "-lakehouse.s3.endpoint=http://s3-latency:9000"
      - "-lakehouse.s3.access-key=minioadmin"
      - "-lakehouse.s3.secret-key=minioadmin"
      - "-lakehouse.s3.force-path-style=true"
      - "-lakehouse.manifest.refresh-interval=30s"
      - "-lakehouse.insert.flush-interval=120s"
      - "-lakehouse.compaction.interval=2m"
      - "-lakehouse.query.file-workers=16"
      - "-lakehouse.pmeta.enabled=true"
      - "-lakehouse.pmeta.always-sketch-fields=trace_id,span_id"
      - "-lakehouse.cache.memory-mb=256"
      - "-lakehouse.cache.disk-path=/data/lakehouse/cache"
      - "-lakehouse.cache.disk-max-mb=2048"
      - "-lakehouse.cache.warmup-partitions=6"
      - "-lakehouse.cache.warmup-max-files=500"
      - "-lakehouse.tenant.global-read-header=X-Lakehouse-Global-Read"
      - "-lakehouse.tenant.global-read-value=lakehouse-e2e-global-key"
      - "-lakehouse.tenant.orgid-header=X-Scope-OrgID"
      - "-lakehouse.tenant.auto-register=true"
      - "-lakehouse.tenant.alias-sync-interval=5s"
      - "-lakehouse.tenant.alias=acme-corp:1001:0,staging-team:1002:0"
      - "-lakehouse.tenant.metrics-format=name"
      - "-lakehouse.tenant.prefix-template={AccountID}/{ProjectID}/"
      - "-lakehouse.config=/etc/lakehouse/policy.yml"
      - "-loggerLevel=INFO"
    volumes:
      - lakehouse-cache-logs:/data/lakehouse
      - ./lakehouse-cluster-config.yml:/etc/lakehouse/policy.yml:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/lakehouse-logs", "healthcheck", "http://localhost:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2g
    restart: on-failure
    # Instance-1 specifics: keep its e2e build context + its 29428 host port.
    build:
      context: ../../
      dockerfile: Dockerfile.logs
    ports:
      - "29428:9428"

  # Instance 2 — reuses the cluster base; distinct port + AZ + cache volume.
  lakehouse-logs-2:
    <<: *logs-cluster-base
    environment:
      LAKEHOUSE_AZ: "az-b"
    ports:
      - "29429:9428"
    volumes:
      - lakehouse-cache-logs-2:/data/lakehouse
      - ./lakehouse-cluster-config.yml:/etc/lakehouse/policy.yml:ro

  # Instance 3 — reuses the cluster base; distinct port + AZ + cache volume.
  lakehouse-logs-3:
    <<: *logs-cluster-base
    environment:
      LAKEHOUSE_AZ: "az-c"
    ports:
      - "29430:9428"
    volumes:
      - lakehouse-cache-logs-3:/data/lakehouse
      - ./lakehouse-cluster-config.yml:/etc/lakehouse/policy.yml:ro

volumes:
  lakehouse-cache-logs-2: {}
  lakehouse-cache-logs-3: {}
