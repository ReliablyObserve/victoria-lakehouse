name: victoria-lakehouse-benchmark

networks:
  bench-net:
    driver: bridge

services:
  # =========================================================================
  # Shared storage — MinIO for Lakehouse + Loki
  # =========================================================================

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "39000:9000"
    networks: [bench-net]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks: [bench-net]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/obs-archive --ignore-existing &&
      mc mb local/loki-data --ignore-existing &&
      mc mb local/tempo-data --ignore-existing &&
      echo 'MinIO buckets ready (obs-archive, loki-data, tempo-data)'
      "

  # =========================================================================
  # S3 latency proxy (toxiproxy) — EVERY S3-backed engine (lakehouse-logs,
  # lakehouse-traces, ClickHouse) reads MinIO through this proxy, so a single
  # toggle injects identical object-store latency for an apples-to-apples
  # comparison. VL/VT are disk-native (the baseline) and bypass it. Inject with
  # scripts/inject-s3-latency.sh <mean_ms> <jitter_ms> (0 = passthrough).
  # =========================================================================
  s3-latency:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    command: ["-host=0.0.0.0", "-config=/etc/toxiproxy/proxies.json"]
    volumes:
      - ./toxiproxy-proxies.json:/etc/toxiproxy/proxies.json:ro
    networks: [bench-net]
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/toxiproxy-cli", "list"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================================================================
  # System A: Victoria Lakehouse (S3 cold tier) — tuned for best performance
  # =========================================================================

  lakehouse-logs:
    build:
      context: ../../
      dockerfile: Dockerfile.logs
    depends_on:
      minio-init:
        condition: service_completed_successfully
      s3-latency:
        condition: service_healthy
    ports:
      - "39428:9428"
    networks: [bench-net]
    command:
      - "-lakehouse.s3.bucket=obs-archive"
      - "-lakehouse.s3.endpoint=http://s3-latency:9000"
      - "-lakehouse.s3.access-key=minioadmin"
      - "-lakehouse.s3.secret-key=minioadmin"
      - "-lakehouse.s3.force-path-style=true"
      - "-lakehouse.manifest.refresh-interval=10s"
      - "-lakehouse.insert.flush-interval=30s"
      - "-lakehouse.query.file-workers=16"
      - "-lakehouse.cache.memory-mb=2048"
      - "-lakehouse.cache.disk-path=/data/lakehouse/cache"
      - "-lakehouse.cache.disk-max-mb=20480"
      - "-lakehouse.cache.warmup-partitions=168"
      - "-lakehouse.cache.warmup-max-files=5000"
      - "-lakehouse.compaction.enabled"
      - "-lakehouse.compaction.interval=30s"
      - "-lakehouse.query.max-files-per-query=10000"
      - "-loggerLevel=INFO"
    volumes:
      - lakehouse-cache-logs:/data/lakehouse
    healthcheck:
      test: ["CMD", "/usr/local/bin/lakehouse-logs", "healthcheck", "http://localhost:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # =========================================================================
  # System B: VictoriaLogs (disk hot tier) — tuned for best performance
  # =========================================================================

  victorialogs:
    image: victoriametrics/victoria-logs:v1.50.0
    command:
      - "-storageDataPath=/data"
      - "-retentionPeriod=30d"
      - "-search.maxConcurrentRequests=64"
      - "-loggerLevel=INFO"
    ports:
      - "39401:9428"
    networks: [bench-net]
    volumes:
      - vl-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # =========================================================================
  # System C: Grafana Loki (S3 cold tier) — tuned for best performance
  # =========================================================================

  loki:
    image: grafana/loki:3.7.1
    user: "0"
    ports:
      - "33100:3100"
    networks: [bench-net]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./loki-benchmark-config.yml:/etc/loki/config.yaml:ro
      - loki-data:/data/loki
    command: -config.file=/etc/loki/config.yaml
    healthcheck:
      test: ["NONE"]
      disable: true

  # =========================================================================
  # System D: Victoria Lakehouse Traces (S3 cold tier)
  # =========================================================================

  lakehouse-traces:
    build:
      context: ../../
      dockerfile: Dockerfile.traces
    depends_on:
      minio-init:
        condition: service_completed_successfully
      s3-latency:
        condition: service_healthy
    ports:
      - "30428:10428"
    networks: [bench-net]
    command:
      - "-lakehouse.s3.bucket=obs-archive"
      - "-lakehouse.s3.endpoint=http://s3-latency:9000"
      - "-lakehouse.s3.access-key=minioadmin"
      - "-lakehouse.s3.secret-key=minioadmin"
      - "-lakehouse.s3.force-path-style=true"
      - "-lakehouse.manifest.refresh-interval=10s"
      - "-lakehouse.insert.flush-interval=30s"
      - "-lakehouse.query.file-workers=16"
      - "-lakehouse.cache.memory-mb=2048"
      - "-lakehouse.cache.disk-path=/data/lakehouse/cache"
      - "-lakehouse.cache.disk-max-mb=20480"
      - "-lakehouse.compaction.enabled"
      - "-lakehouse.compaction.interval=30s"
      - "-lakehouse.query.max-files-per-query=10000"
      - "-loggerLevel=INFO"
    volumes:
      - lakehouse-cache-traces:/data/lakehouse
    healthcheck:
      test: ["CMD", "/usr/local/bin/lakehouse-traces", "healthcheck", "http://localhost:10428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # =========================================================================
  # System E: VictoriaTraces (disk hot tier)
  # =========================================================================

  victoriatraces:
    image: victoriametrics/victoria-traces:v0.9.2
    command:
      - "-storageDataPath=/data"
      - "-retentionPeriod=30d"
      - "-httpListenAddr=:10428"
      - "-loggerLevel=INFO"
    ports:
      - "30401:10428"
    networks: [bench-net]
    volumes:
      - vt-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:10428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # =========================================================================
  # System F: Grafana Tempo (S3 cold tier)
  # =========================================================================

  tempo:
    image: grafana/tempo:2.7.2
    user: "0"
    ports:
      - "33200:3200"
      - "34318:4318"
    networks: [bench-net]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./tempo-benchmark-config.yml:/etc/tempo/config.yaml:ro
      - tempo-data:/data/tempo
    command: -config.file=/etc/tempo/config.yaml
    healthcheck:
      test: ["NONE"]
      disable: true

  # =========================================================================
  # System G: ClickHouse — reads Lakehouse Parquet files directly from S3
  # =========================================================================

  clickhouse:
    image: clickhouse/clickhouse-server:26.5
    ports:
      - "38123:8123"
      - "39009:9000"
    networks: [bench-net]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./clickhouse/init-s3.sql:/docker-entrypoint-initdb.d/init-s3.sql:ro
    environment:
      CLICKHOUSE_DB: lakehouse
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: benchmark
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # =========================================================================
  # Data Generation — write to all 6 systems (3 logs + 3 traces)
  # =========================================================================

  datagen-seed:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      victorialogs:
        condition: service_healthy
      lakehouse-logs:
        condition: service_healthy
      loki:
        condition: service_started
      victoriatraces:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
      tempo:
        condition: service_started
    networks: [bench-net]
    command:
      - "--logs=100000"
      - "--traces=50000"
      - "--hours-back=168"
      - "--vl-endpoint=http://victorialogs:9428"
      - "--lh-logs-endpoint=http://lakehouse-logs:9428"
      - "--loki-endpoint=http://loki:3100"
      - "--vt-endpoint=http://victoriatraces:10428"
      - "--lh-traces-endpoint=http://lakehouse-traces:10428"
      - "--tempo-endpoint=http://tempo:4318"

  # =========================================================================
  # Loki-VL-Proxy — LH only (cold-only mode, no VL hot tier)
  # =========================================================================

  loki-vl-proxy-lh:
    build:
      context: .
      dockerfile: Dockerfile.loki-vl-proxy
    environment:
      VL_BACKEND_URL: "http://lakehouse-logs:9428"
    command:
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=true"
      - "-stream-fields=service_name,k8s_namespace_name,k8s_pod_name,k8s_deployment_name,deployment_environment"
      - "-extra-label-fields=level,cloud_region"
      - "-server.admin-auth-token=bench-token"
    depends_on:
      lakehouse-logs:
        condition: service_healthy
    ports:
      - "23100:3100"
    networks: [bench-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # =========================================================================
  # Loki-VL-Proxy — VL + LH (hot+cold routing)
  # =========================================================================

  loki-vl-proxy-vl-lh:
    build:
      context: .
      dockerfile: Dockerfile.loki-vl-proxy
    environment:
      VL_BACKEND_URL: "http://victorialogs:9428"
    command:
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=true"
      - "-stream-fields=service_name,k8s_namespace_name,k8s_pod_name,k8s_deployment_name,deployment_environment"
      - "-extra-label-fields=level,cloud_region"
      - "-cold-enabled=true"
      - "-cold-backend=http://lakehouse-logs:9428"
      - "-cold-boundary=24h"
      - "-cold-overlap=1h"
      - "-cold-manifest-refresh=30s"
      - "-server.admin-auth-token=bench-token"
    depends_on:
      lakehouse-logs:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    ports:
      - "23101:3100"
    networks: [bench-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # =========================================================================
  # VictoriaMetrics — scrapes metrics from all systems
  # =========================================================================

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.143.0
    networks: [bench-net]
    command:
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-retentionPeriod=7d"
      - "-httpListenAddr=:8428"
    volumes:
      - ./prometheus/prometheus-benchmark.yml:/etc/prometheus/prometheus.yml:ro
      - vm-data:/victoria-metrics-data
    depends_on:
      lakehouse-logs:
        condition: service_healthy
    ports:
      - "38428:8428"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  lakehouse-cache-logs: {}
  lakehouse-cache-traces: {}
  vl-data: {}
  vt-data: {}
  loki-data: {}
  tempo-data: {}
  vm-data: {}
