name: victoria-lakehouse

networks:
  lakehouse-net:
    driver: bridge

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "29000:9000"
    networks: [lakehouse-net]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks: [lakehouse-net]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/obs-archive --ignore-existing &&
      echo 'MinIO bucket ready'
      "

  # =========================================================================
  # Hot Tier — Disk-based, 24h retention
  # =========================================================================

  victorialogs:
    image: victoriametrics/victoria-logs:v1.50.0
    command:
      - "-storageDataPath=/data"
      - "-retentionPeriod=24h"
      - "-loggerLevel=INFO"
    networks: [lakehouse-net]
    volumes:
      - vl-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  victoriatraces:
    image: victoriametrics/victoria-traces:v0.8.2
    command:
      - "-storageDataPath=/data"
      - "-retentionPeriod=24h"
      - "-loggerLevel=INFO"
    networks: [lakehouse-net]
    volumes:
      - vt-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:10428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # =========================================================================
  # Data Generation — dual-write to hot (disk) + cold (S3) in parallel
  # =========================================================================

  datagen-seed:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      victorialogs:
        condition: service_healthy
      victoriatraces:
        condition: service_healthy
      lakehouse-logs:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    networks: [lakehouse-net]
    command:
      - "--logs=50000"
      - "--traces=10000"
      - "--hours-back=48"
      - "--vl-endpoint=http://victorialogs:9428"
      - "--vt-endpoint=http://victoriatraces:10428"
      - "--lh-logs-endpoint=http://lakehouse-logs:9428"
      - "--lh-traces-endpoint=http://lakehouse-traces:10428"

  datagen-seed-tenant1:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      victorialogs:
        condition: service_healthy
      victoriatraces:
        condition: service_healthy
      lakehouse-logs:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    networks: [lakehouse-net]
    command:
      - "--logs=2000"
      - "--traces=500"
      - "--hours-back=72"
      - "--vl-endpoint=http://victorialogs:9428"
      - "--vt-endpoint=http://victoriatraces:10428"
      - "--lh-logs-endpoint=http://lakehouse-logs:9428"
      - "--lh-traces-endpoint=http://lakehouse-traces:10428"
      - "--account-id=1"
      - "--project-id=1"

  datagen-seed-orgid:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      lakehouse-logs:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    networks: [lakehouse-net]
    command:
      - "--logs=2000"
      - "--traces=500"
      - "--hours-back=72"
      - "--lh-logs-endpoint=http://lakehouse-logs:9428"
      - "--lh-traces-endpoint=http://lakehouse-traces:10428"
      - "--org-id=acme-corp"

  datagen-seed-orgid2:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      lakehouse-logs:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    networks: [lakehouse-net]
    command:
      - "--logs=1000"
      - "--traces=250"
      - "--hours-back=48"
      - "--lh-logs-endpoint=http://lakehouse-logs:9428"
      - "--lh-traces-endpoint=http://lakehouse-traces:10428"
      - "--org-id=staging-team"

  datagen-continuous:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      datagen-seed:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [lakehouse-net]
    command:
      - "--logs=2000"
      - "--traces=500"
      - "--hours-back=1"
      - "--interval=60s"
      - "--vl-endpoint=http://victorialogs:9428"
      - "--vt-endpoint=http://victoriatraces:10428"
      - "--lh-logs-endpoint=http://lakehouse-logs:9428"
      - "--lh-traces-endpoint=http://lakehouse-traces:10428"

  # =========================================================================
  # Cold Tier — S3 Parquet, 7d+ retention (lakehouse)
  # =========================================================================

  lakehouse-logs:
    build:
      context: ../../
      dockerfile: Dockerfile.logs
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "29428:9428"
    networks: [lakehouse-net]
    environment:
      LAKEHOUSE_AZ: "az-a"
    command:
      - "-lakehouse.s3.bucket=obs-archive"
      - "-lakehouse.s3.endpoint=http://minio:9000"
      - "-lakehouse.s3.access-key=minioadmin"
      - "-lakehouse.s3.secret-key=minioadmin"
      - "-lakehouse.s3.force-path-style=true"
      - "-lakehouse.manifest.refresh-interval=30s"
      - "-lakehouse.insert.flush-interval=120s"
      - "-lakehouse.compaction.leader-election=s3"
      - "-lakehouse.compaction.interval=2m"
      - "-lakehouse.query.file-workers=64"
      - "-lakehouse.cache.memory-mb=512"
      - "-lakehouse.cache.disk-path=/data/lakehouse/cache"
      - "-lakehouse.cache.disk-max-mb=2048"
      - "-lakehouse.tenant.global-read-header=X-Lakehouse-Global-Read"
      - "-lakehouse.tenant.global-read-value=lakehouse-e2e-global-key"
      - "-lakehouse.tenant.orgid-header=X-Scope-OrgID"
      - "-lakehouse.tenant.auto-register=true"
      - "-lakehouse.tenant.metrics-format=name"
      - "-loggerLevel=INFO"
    volumes:
      - lakehouse-cache-logs:/data/lakehouse
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck", "http://localhost:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  lakehouse-traces:
    build:
      context: ../../
      dockerfile: Dockerfile.traces
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "20428:10428"
    networks: [lakehouse-net]
    environment:
      LAKEHOUSE_AZ: "az-a"
    command:
      - "-lakehouse.s3.bucket=obs-archive"
      - "-lakehouse.s3.endpoint=http://minio:9000"
      - "-lakehouse.s3.access-key=minioadmin"
      - "-lakehouse.s3.secret-key=minioadmin"
      - "-lakehouse.s3.force-path-style=true"
      - "-lakehouse.manifest.refresh-interval=30s"
      - "-lakehouse.insert.flush-interval=120s"
      - "-lakehouse.query.file-workers=64"
      - "-lakehouse.cache.memory-mb=512"
      - "-lakehouse.cache.disk-path=/data/lakehouse/cache"
      - "-lakehouse.cache.disk-max-mb=2048"
      - "-lakehouse.compaction.leader-election=s3"
      - "-lakehouse.compaction.interval=2m"
      - "-lakehouse.tenant.global-read-header=X-Lakehouse-Global-Read"
      - "-lakehouse.tenant.global-read-value=lakehouse-e2e-global-key"
      - "-lakehouse.tenant.orgid-header=X-Scope-OrgID"
      - "-lakehouse.tenant.auto-register=true"
      - "-lakehouse.tenant.metrics-format=name"
      - "-loggerLevel=INFO"
    volumes:
      - lakehouse-cache-traces:/data/lakehouse
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck", "http://localhost:10428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # =========================================================================
  # Multi-Level Select — fan out to hot (disk) + cold (lakehouse)
  # =========================================================================

  vlselect:
    image: victoriametrics/victoria-logs:v1.50.0
    command:
      - "-storageNode=victorialogs:9428,lakehouse-logs:9428"
      - "-httpListenAddr=:9428"
      - "-loggerLevel=INFO"
    depends_on:
      victorialogs:
        condition: service_healthy
      lakehouse-logs:
        condition: service_healthy
    ports:
      - "29471:9428"
    networks: [lakehouse-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  vtselect:
    image: victoriametrics/victoria-traces:v0.8.2
    command:
      - "-storageNode=victoriatraces:10428,lakehouse-traces:10428"
      - "-httpListenAddr=:10428"
      - "-loggerLevel=INFO"
    depends_on:
      victoriatraces:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    ports:
      - "20471:10428"
    networks: [lakehouse-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:10428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # =========================================================================
  # Loki-VL-proxy — hot+cold routing via Loki API
  # =========================================================================

  loki-vl-proxy:
    build:
      context: .
      dockerfile: Dockerfile.loki-vl-proxy
    environment:
      VL_BACKEND_URL: "http://victorialogs:9428"
    command:
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=true"
      - "-stream-fields=service_name,k8s_namespace_name,k8s_pod_name,k8s_deployment_name,deployment_environment"
      - "-extra-label-fields=level,cloud_region"
      - "-derived-fields=[{\"name\":\"traceID\",\"matcherRegex\":\"trace_id=([a-f0-9]+)\",\"url\":\"http://localhost:3003/explore?left=%5B%22now-1h%22,%22now%22,%22victoria-lakehouse-traces%22,%7B%22query%22:%22$${__value.raw}%22%7D%5D\"}]"
      - "-patterns-autodetect-from-queries=true"
      - "-label-values-indexed-cache=true"
      - "-cold-enabled=true"
      - "-cold-backend=http://lakehouse-logs:9428"
      - "-cold-boundary=24h"
      - "-cold-overlap=1h"
      - "-cold-manifest-refresh=30s"
      - "-server.admin-auth-token=dev-token"
    depends_on:
      lakehouse-logs:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    ports:
      - "23100:3100"
    networks: [lakehouse-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # =========================================================================
  # Analytics — ClickHouse for direct S3 Parquet queries
  # =========================================================================

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks: [lakehouse-net]
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - ./clickhouse/init-s3.sql:/docker-entrypoint-initdb.d/init-s3.sql:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # =========================================================================
  # VictoriaMetrics — scrapes lakehouse metrics for dashboards
  # =========================================================================

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.143.0
    networks: [lakehouse-net]
    command:
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-retentionPeriod=7d"
      - "-httpListenAddr=:8428"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - vm-data:/victoria-metrics-data
    depends_on:
      lakehouse-logs:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    ports:
      - "28428:8428"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # =========================================================================
  # Grafana — pre-configured with all datasources
  # =========================================================================

  grafana:
    build:
      context: .
      dockerfile: Dockerfile.grafana
    ports:
      - "3003:3000"
    networks: [lakehouse-net]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "victoriametrics-logs-datasource"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      vlselect:
        condition: service_healthy
      loki-vl-proxy:
        condition: service_healthy

volumes:
  vl-data: {}
  vt-data: {}
  lakehouse-cache-logs: {}
  lakehouse-cache-traces: {}
  vm-data: {}
  grafana-data: {}
