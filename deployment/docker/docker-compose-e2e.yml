name: victoria-lakehouse

networks:
  lakehouse-net:
    driver: bridge

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    networks: [lakehouse-net]
    ports:
      # Bound to localhost only so the host-side e2e test suite (see
      # tests/e2e/multitenancy_test.go:23) can reach the S3 API for
      # tenant-isolation assertions without exposing MinIO publicly.
      - "127.0.0.1:29000:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks: [lakehouse-net]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/obs-archive --ignore-existing &&
      echo 'MinIO bucket ready'
      "

  # =========================================================================
  # S3 latency proxy — Shopify toxiproxy in front of MinIO.
  #
  # Default behavior: pass-through (0ms added). Run scripts/inject-s3-latency.sh
  # with a millisecond value to dial in S3 latency that simulates a real
  # cloud bucket (typical p50 25-100ms, p99 300-1000ms, occasional 2s+).
  #
  # The lakehouse-traces and lakehouse-logs services point at this proxy
  # rather than minio directly, so any latency added here is felt by the
  # LH read/write paths but not by the host-side test suite (which still
  # talks to MinIO at localhost:29000 directly without any added delay).
  # =========================================================================

  s3-latency:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    command: ["-host=0.0.0.0", "-config=/etc/toxiproxy/proxies.json"]
    volumes:
      - ./toxiproxy-proxies.json:/etc/toxiproxy/proxies.json:ro
    networks: [lakehouse-net]
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/toxiproxy-cli", "list"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================================================================
  # Hot Tier — Disk-based, 24h retention
  # =========================================================================

  victorialogs:
    image: victoriametrics/victoria-logs:v1.50.0
    command:
      - "-storageDataPath=/data"
      - "-retentionPeriod=24h"
      - "-loggerLevel=INFO"
    networks: [lakehouse-net]
    volumes:
      - vl-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  victoriatraces:
    image: victoriametrics/victoria-traces:v0.9.2
    command:
      - "-storageDataPath=/data"
      - "-retentionPeriod=24h"
      - "-loggerLevel=INFO"
      - "-servicegraph.enableTask=true"
      - "-servicegraph.taskInterval=1m"
      - "-servicegraph.taskLookbehind=2m"
      - "-servicegraph.taskTimeout=30s"
    networks: [lakehouse-net]
    # Expose hot VT for host-side parity tests that compare against
    # the cold tier. Bound to localhost to avoid accidental external
    # exposure of the unauthenticated /select endpoints.
    ports:
      - "127.0.0.1:10428:10428"
    volumes:
      - vt-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:10428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # =========================================================================
  # Data Generation — dual-write to hot (disk) + cold (S3) in parallel
  # =========================================================================

  datagen-seed:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      victorialogs:
        condition: service_healthy
      victoriatraces:
        condition: service_healthy
      lakehouse-logs:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    networks: [lakehouse-net]
    command:
      - "--logs=50000"
      - "--traces=10000"
      - "--hours-back=48"
      - "--vl-endpoint=http://victorialogs:9428"
      - "--vt-endpoint=http://victoriatraces:10428"
      - "--lh-logs-endpoint=http://lakehouse-logs:9428"
      - "--lh-traces-endpoint=http://lakehouse-traces:10428"

  datagen-seed-tenant1:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      victorialogs:
        condition: service_healthy
      victoriatraces:
        condition: service_healthy
      lakehouse-logs:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    networks: [lakehouse-net]
    command:
      - "--logs=2000"
      - "--traces=500"
      - "--hours-back=72"
      - "--vl-endpoint=http://victorialogs:9428"
      - "--vt-endpoint=http://victoriatraces:10428"
      - "--lh-logs-endpoint=http://lakehouse-logs:9428"
      - "--lh-traces-endpoint=http://lakehouse-traces:10428"
      - "--account-id=1"
      - "--project-id=1"

  datagen-seed-orgid:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      lakehouse-logs:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    networks: [lakehouse-net]
    command:
      - "--logs=2000"
      - "--traces=500"
      - "--hours-back=72"
      - "--lh-logs-endpoint=http://lakehouse-logs:9428"
      - "--lh-traces-endpoint=http://lakehouse-traces:10428"
      - "--org-id=acme-corp"

  datagen-seed-orgid2:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      lakehouse-logs:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    networks: [lakehouse-net]
    command:
      - "--logs=1000"
      - "--traces=250"
      - "--hours-back=48"
      - "--lh-logs-endpoint=http://lakehouse-logs:9428"
      - "--lh-traces-endpoint=http://lakehouse-traces:10428"
      - "--org-id=staging-team"

  datagen-continuous:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      datagen-seed:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [lakehouse-net]
    command:
      - "--logs=2000"
      - "--traces=500"
      - "--hours-back=1"
      - "--interval=60s"
      - "--vl-endpoint=http://victorialogs:9428"
      - "--vt-endpoint=http://victoriatraces:10428"
      - "--lh-logs-endpoint=http://lakehouse-logs:9428"
      - "--lh-traces-endpoint=http://lakehouse-traces:10428"

  # =========================================================================
  # Cold Tier — S3 Parquet, 7d+ retention (lakehouse)
  # =========================================================================

  lakehouse-logs:
    build:
      context: ../../
      dockerfile: Dockerfile.logs
    depends_on:
      minio-init:
        condition: service_completed_successfully
      s3-latency:
        condition: service_healthy
    # Exposed for VMUI access at http://localhost:29428/select/vmui/
    ports:
      - "29428:9428"
    networks: [lakehouse-net]
    environment:
      LAKEHOUSE_AZ: "az-a"
    command:
      - "-lakehouse.s3.bucket=obs-archive"
      - "-lakehouse.s3.endpoint=http://s3-latency:9000"
      - "-lakehouse.s3.access-key=minioadmin"
      - "-lakehouse.s3.secret-key=minioadmin"
      - "-lakehouse.s3.force-path-style=true"
      - "-lakehouse.manifest.refresh-interval=30s"
      - "-lakehouse.insert.flush-interval=120s"
      - "-lakehouse.compaction.interval=2m"
      - "-lakehouse.query.file-workers=16"
      # No artificial file cap — VL upstream has none. The
      # query.max-live-bytes budget (default 512 MiB), the rgDecodeSem
      # semaphore, AND the process-wide fileBudgetSem (default 256 MiB
      # cumulative resident + max 8 concurrent files) bound memory
      # regardless of file count. A 7-day wildcard hits ~600 files and
      # completes under mem_limit=2g instead of being rejected as
      # "too wide" or OOM-killing the container.
      #
      # L1 cache shrunk from 512 MiB to 256 MiB so the steady-state
      # cache footprint plus query-time transient (file budget 256 MiB
      # + decode peaks ~200 MiB + parquet-go pools ~200 MiB + baseline
      # ~300 MiB + Go runtime overhead ~200 MiB) fits inside the 2 GiB
      # cgroup with headroom for back-to-back 7-day wildcards. The L2
      # disk cache (2 GiB) keeps hot files locally so subsequent
      # queries hit disk instead of S3.
      - "-lakehouse.cache.memory-mb=256"
      - "-lakehouse.cache.disk-path=/data/lakehouse/cache"
      - "-lakehouse.cache.disk-max-mb=2048"
      - "-lakehouse.cache.warmup-partitions=6"
      - "-lakehouse.cache.warmup-max-files=500"
      - "-lakehouse.tenant.global-read-header=X-Lakehouse-Global-Read"
      - "-lakehouse.tenant.global-read-value=lakehouse-e2e-global-key"
      - "-lakehouse.tenant.orgid-header=X-Scope-OrgID"
      - "-lakehouse.tenant.auto-register=true"
      - "-lakehouse.tenant.alias-sync-interval=5s"
      - "-lakehouse.tenant.metrics-format=name"
      - "-lakehouse.tenant.prefix-template={AccountID}/{ProjectID}/"
      - "-lakehouse.config=/etc/lakehouse/policy.yml"
      - "-loggerLevel=INFO"
    volumes:
      - lakehouse-cache-logs:/data/lakehouse
      - ./lakehouse-e2e-config.yml:/etc/lakehouse/policy.yml:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/lakehouse-logs", "healthcheck", "http://localhost:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2g
    restart: on-failure

  lakehouse-traces:
    build:
      context: ../../
      dockerfile: Dockerfile.traces
    depends_on:
      minio-init:
        condition: service_completed_successfully
      s3-latency:
        condition: service_healthy
    # Exposed for VMUI access at http://localhost:20428/select/vmui/
    ports:
      - "20428:10428"
    networks: [lakehouse-net]
    environment:
      LAKEHOUSE_AZ: "az-a"
    command:
      - "-lakehouse.s3.bucket=obs-archive"
      - "-lakehouse.s3.endpoint=http://s3-latency:9000"
      - "-lakehouse.s3.access-key=minioadmin"
      - "-lakehouse.s3.secret-key=minioadmin"
      - "-lakehouse.s3.force-path-style=true"
      - "-lakehouse.manifest.refresh-interval=30s"
      - "-lakehouse.insert.flush-interval=120s"
      - "-lakehouse.query.file-workers=16"
      # No artificial file cap — VL upstream has none. The
      # query.max-live-bytes budget (default 512 MiB) plus the
      # rgDecodeSem semaphore bound memory regardless of file count.
      # A 7-day wildcard hits ~600 files and now completes under
      # mem_limit=2g instead of being rejected as "too wide."
      - "-lakehouse.cache.memory-mb=512"
      - "-lakehouse.cache.disk-path=/data/lakehouse/cache"
      - "-lakehouse.cache.disk-max-mb=2048"
      - "-lakehouse.compaction.interval=2m"
      - "-lakehouse.tenant.global-read-header=X-Lakehouse-Global-Read"
      - "-lakehouse.tenant.global-read-value=lakehouse-e2e-global-key"
      - "-lakehouse.tenant.orgid-header=X-Scope-OrgID"
      - "-lakehouse.tenant.auto-register=true"
      - "-lakehouse.tenant.alias-sync-interval=5s"
      - "-lakehouse.tenant.metrics-format=name"
      - "-lakehouse.tenant.prefix-template={AccountID}/{ProjectID}/"
      # VT upstream defaults latencyOffset=30s. Our cold tier flushes
      # parquet files every -lakehouse.insert.flush-interval=120s, so
      # the freshest queryable span lags real time by up to ~2 min.
      # Setting latencyOffset to 2m matches that lag and stops the
      # upstream Jaeger search loop from clamping endTime past the data
      # OR clamping inside the lag window (the 30s default included
      # spans that hadn't flushed yet, and a previously-used 10m value
      # clamped past genuinely-fresh data). This is the only setting we
      # override beyond upstream defaults; it reflects a real
      # cold-tier write-lag, not an LH-specific trick.
      - "-search.latencyOffset=2m"
      # Enable VT's service-graph background task on the cold tier.
      # The task queries spans (via our adapter) and persists edge
      # rows back to S3, which the Jaeger /api/dependencies reader
      # picks up unchanged. taskLookbehind covers the flush lag
      # so newly-flushed spans contribute to the next aggregation.
      #
      # Timeout is bumped from the 30s upstream default to 5m: the
      # task runs a join+aggregation over the entire lookbehind
      # window's spans on cold storage. With 24h+ of accumulated
      # data per partition this needs more time than the hot-tier
      # default assumed.
      - "-servicegraph.enableTask=true"
      - "-servicegraph.taskInterval=5m"
      - "-servicegraph.taskLookbehind=10m"
      - "-servicegraph.taskTimeout=4m"
      - "-lakehouse.config=/etc/lakehouse/policy.yml"
      - "-loggerLevel=INFO"
    volumes:
      - lakehouse-cache-traces:/data/lakehouse
      - ./lakehouse-e2e-config.yml:/etc/lakehouse/policy.yml:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/lakehouse-traces", "healthcheck", "http://localhost:10428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2g
    restart: on-failure

  # =========================================================================
  # Multi-Level Select — fan out to hot (disk) + cold (lakehouse)
  # =========================================================================

  vlselect:
    image: victoriametrics/victoria-logs:v1.50.0
    command:
      - "-storageNode=victorialogs:9428,lakehouse-logs:9428"
      - "-httpListenAddr=:9428"
      - "-loggerLevel=INFO"
    depends_on:
      victorialogs:
        condition: service_healthy
      lakehouse-logs:
        condition: service_healthy
    networks: [lakehouse-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  vtselect:
    image: victoriametrics/victoria-traces:v0.9.2
    command:
      - "-storageNode=victoriatraces:10428,lakehouse-traces:10428"
      - "-httpListenAddr=:10428"
      - "-loggerLevel=INFO"
    depends_on:
      victoriatraces:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    networks: [lakehouse-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:10428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # =========================================================================
  # Loki-VL-proxy — hot+cold routing via Loki API
  # =========================================================================

  loki-vl-proxy:
    build:
      context: .
      dockerfile: Dockerfile.loki-vl-proxy
    environment:
      VL_BACKEND_URL: "http://victorialogs:9428"
    command:
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=true"
      - "-stream-fields=service_name,k8s_namespace_name,k8s_pod_name,k8s_deployment_name,deployment_environment"
      - "-extra-label-fields=level,cloud_region"
      - "-derived-fields=[{\"name\":\"traceID\",\"matcherRegex\":\"trace_id=([a-f0-9]+)\",\"url\":\"http://localhost:3003/explore?left=%5B%22now-1h%22,%22now%22,%22victoria-lakehouse-traces%22,%7B%22query%22:%22$${__value.raw}%22%7D%5D\"}]"
      - "-patterns-autodetect-from-queries=true"
      - "-label-values-indexed-cache=true"
      - "-cold-enabled=true"
      - "-cold-backend=http://lakehouse-logs:9428"
      - "-cold-boundary=24h"
      - "-cold-overlap=1h"
      - "-cold-manifest-refresh=30s"
      - "-server.admin-auth-token=dev-token"
    depends_on:
      lakehouse-logs:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    networks: [lakehouse-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # =========================================================================
  # Loki-VL-proxy — cold-only (LH backend, no VL hot tier)
  # =========================================================================

  loki-vl-proxy-cold:
    build:
      context: .
      dockerfile: Dockerfile.loki-vl-proxy
    environment:
      VL_BACKEND_URL: "http://lakehouse-logs:9428"
    command:
      - "-label-style=underscores"
      - "-metadata-field-mode=translated"
      - "-emit-structured-metadata=true"
      - "-stream-fields=service_name,k8s_namespace_name,k8s_pod_name,k8s_deployment_name,deployment_environment"
      - "-extra-label-fields=level,cloud_region"
      - "-derived-fields=[{\"name\":\"traceID\",\"matcherRegex\":\"trace_id=([a-f0-9]+)\",\"url\":\"http://localhost:3003/explore?left=%5B%22now-1h%22,%22now%22,%22victoria-lakehouse-traces%22,%7B%22query%22:%22$${__value.raw}%22%7D%5D\"}]"
      - "-patterns-autodetect-from-queries=true"
      - "-label-values-indexed-cache=true"
      - "-server.admin-auth-token=dev-token"
    depends_on:
      lakehouse-logs:
        condition: service_healthy
    networks: [lakehouse-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # =========================================================================
  # Analytics — ClickHouse for direct S3 Parquet queries
  # =========================================================================

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    depends_on:
      minio-init:
        condition: service_completed_successfully
      s3-latency:
        condition: service_healthy
    networks: [lakehouse-net]
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - ./clickhouse/init-s3.sql:/docker-entrypoint-initdb.d/init-s3.sql:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # =========================================================================
  # VictoriaMetrics — scrapes lakehouse metrics for dashboards
  # =========================================================================

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.143.0
    networks: [lakehouse-net]
    command:
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-retentionPeriod=7d"
      - "-httpListenAddr=:8428"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - vm-data:/victoria-metrics-data
    depends_on:
      lakehouse-logs:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # =========================================================================
  # Grafana — pre-configured with all datasources
  # =========================================================================

  grafana:
    build:
      context: .
      dockerfile: Dockerfile.grafana
    ports:
      - "3003:3000"
    networks: [lakehouse-net]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "victoriametrics-logs-datasource"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      vlselect:
        condition: service_healthy
      loki-vl-proxy:
        condition: service_healthy

  # =========================================================================
  # Jaeger UI — upstream Jaeger query UI in front of VT (hot) and LH (cold).
  #
  # Architecture per side (hot/cold):
  #   - jaeger-query-{hot,cold}: upstream jaegertracing/jaeger-query with
  #     SPAN_STORAGE_TYPE=memory. We don't use its in-memory backend for
  #     data — it just serves the UI's embedded static assets. Internal-only.
  #   - jaeger-proxy-{hot,cold}: nginx in front that proxies /api/* to
  #     VT or lakehouse-traces (path rewrite /api → /select/jaeger/api)
  #     and falls through to jaeger-query for everything else.
  #
  # Browse: hot=http://localhost:16686  cold=http://localhost:16687
  # System Architecture menu shows the Dependencies graph from the
  # respective tier's /select/jaeger/api/dependencies endpoint.
  # =========================================================================

  jaeger-query-hot:
    image: jaegertracing/jaeger-query:1.62.0
    environment:
      SPAN_STORAGE_TYPE: memory
    networks: [lakehouse-net]

  jaeger-proxy-hot:
    image: nginx:alpine
    ports:
      - "16686:80"
    environment:
      BACKEND_HOST: victoriatraces
      BACKEND_PORT: "10428"
      UI_HOST: jaeger-query-hot
      UI_PORT: "16686"
    volumes:
      - ./jaeger-ui-proxy.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks: [lakehouse-net]
    depends_on:
      victoriatraces:
        condition: service_healthy
      jaeger-query-hot:
        condition: service_started

  jaeger-query-cold:
    image: jaegertracing/jaeger-query:1.62.0
    environment:
      SPAN_STORAGE_TYPE: memory
    networks: [lakehouse-net]

  jaeger-proxy-cold:
    image: nginx:alpine
    ports:
      - "16687:80"
    environment:
      BACKEND_HOST: lakehouse-traces
      BACKEND_PORT: "10428"
      UI_HOST: jaeger-query-cold
      UI_PORT: "16686"
    volumes:
      - ./jaeger-ui-proxy.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks: [lakehouse-net]
    depends_on:
      lakehouse-traces:
        condition: service_healthy
      jaeger-query-cold:
        condition: service_started

volumes:
  vl-data: {}
  vt-data: {}
  lakehouse-cache-logs: {}
  lakehouse-cache-traces: {}
  vm-data: {}
  grafana-data: {}
