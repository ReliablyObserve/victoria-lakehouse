services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/obs-archive --ignore-existing &&
      echo 'MinIO bucket ready'
      "

  lakehouse-logs:
    build:
      context: ../../
      dockerfile: Dockerfile
    depends_on:
      minio-init:
        condition: service_completed_successfully
    command:
      - "--lakehouse.mode=logs"
      - "--lakehouse.s3.bucket=obs-archive"
      - "--lakehouse.s3.endpoint=http://minio:9000"
      - "--lakehouse.s3.access-key=minioadmin"
      - "--lakehouse.s3.secret-key=minioadmin"
      - "--lakehouse.s3.force-path-style=true"
      - "--lakehouse.cache.disk-path=/data/lakehouse/cache"
      - "--lakehouse.cache.disk-limit=1GB"
      - "--lakehouse.startup.serve-stale=true"
    ports:
      - "9428:9428"
    volumes:
      - lakehouse-cache-logs:/data/lakehouse

  lakehouse-traces:
    build:
      context: ../../
      dockerfile: Dockerfile
    depends_on:
      minio-init:
        condition: service_completed_successfully
    command:
      - "--lakehouse.mode=traces"
      - "--lakehouse.s3.bucket=obs-archive"
      - "--lakehouse.s3.endpoint=http://minio:9000"
      - "--lakehouse.s3.access-key=minioadmin"
      - "--lakehouse.s3.secret-key=minioadmin"
      - "--lakehouse.s3.force-path-style=true"
      - "--lakehouse.cache.disk-path=/data/lakehouse/cache"
      - "--lakehouse.cache.disk-limit=1GB"
      - "--lakehouse.startup.serve-stale=true"
    ports:
      - "10428:10428"
    volumes:
      - lakehouse-cache-traces:/data/lakehouse

volumes:
  lakehouse-cache-logs: {}
  lakehouse-cache-traces: {}
