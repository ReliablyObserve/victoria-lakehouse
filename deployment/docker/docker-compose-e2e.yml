name: victoria-lakehouse

networks:
  lakehouse-net:
    driver: bridge

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    networks: [lakehouse-net]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks: [lakehouse-net]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/obs-archive --ignore-existing &&
      echo 'MinIO bucket ready'
      "

  victorialogs:
    image: victoriametrics/victoria-logs:v1.50.0
    command:
      - "-storageDataPath=/data"
      - "-retentionPeriod=7d"
      - "-loggerLevel=INFO"
    networks: [lakehouse-net]
    volumes:
      - vl-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  datagen-seed:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      minio-init:
        condition: service_completed_successfully
      victorialogs:
        condition: service_healthy
    networks: [lakehouse-net]
    command:
      - "--endpoint=http://minio:9000"
      - "--bucket=obs-archive"
      - "--access-key=minioadmin"
      - "--secret-key=minioadmin"
      - "--logs=5000"
      - "--traces=1000"
      - "--hours-back=48"
      - "--dual-write"
      - "--vl-endpoint=http://victorialogs:9428"

  datagen-continuous:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      datagen-seed:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [lakehouse-net]
    command:
      - "--endpoint=http://minio:9000"
      - "--bucket=obs-archive"
      - "--access-key=minioadmin"
      - "--secret-key=minioadmin"
      - "--logs=500"
      - "--traces=200"
      - "--hours-back=1"
      - "--interval=30s"
      - "--dual-write"
      - "--vl-endpoint=http://victorialogs:9428"

  lakehouse-logs:
    build:
      context: ../../
      dockerfile: Dockerfile
    depends_on:
      datagen-seed:
        condition: service_completed_successfully
    networks: [lakehouse-net]
    command:
      - "-lakehouse.mode=logs"
      - "-lakehouse.s3.bucket=obs-archive"
      - "-lakehouse.s3.endpoint=http://minio:9000"
      - "-lakehouse.s3.access-key=minioadmin"
      - "-lakehouse.s3.secret-key=minioadmin"
      - "-lakehouse.s3.force-path-style=true"
      - "-lakehouse.manifest.refresh-interval=30s"
      - "-loggerLevel=DEBUG"
    volumes:
      - lakehouse-cache-logs:/data/lakehouse
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck", "http://localhost:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  lakehouse-traces:
    build:
      context: ../../
      dockerfile: Dockerfile
    depends_on:
      datagen-seed:
        condition: service_completed_successfully
    networks: [lakehouse-net]
    command:
      - "-lakehouse.mode=traces"
      - "-lakehouse.s3.bucket=obs-archive"
      - "-lakehouse.s3.endpoint=http://minio:9000"
      - "-lakehouse.s3.access-key=minioadmin"
      - "-lakehouse.s3.secret-key=minioadmin"
      - "-lakehouse.s3.force-path-style=true"
      - "-lakehouse.manifest.refresh-interval=30s"
      - "-loggerLevel=DEBUG"
    volumes:
      - lakehouse-cache-traces:/data/lakehouse
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck", "http://localhost:10428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  vlselect:
    image: victoriametrics/victoria-logs:v1.50.0
    command:
      - "-storageNode=victorialogs:9428"
      - "-storageNode=lakehouse-logs:9428"
      - "-httpListenAddr=:9471"
      - "-loggerLevel=INFO"
    depends_on:
      victorialogs:
        condition: service_healthy
      lakehouse-logs:
        condition: service_healthy
    networks: [lakehouse-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9471/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  loki-vl-proxy:
    image: ghcr.io/reliablyobserve/loki-vl-proxy:latest
    environment:
      BACKEND_URL: "http://lakehouse-logs:9428"
    depends_on:
      lakehouse-logs:
        condition: service_healthy
    networks: [lakehouse-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3003:3000"
    networks: [lakehouse-net]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: "https://github.com/VictoriaMetrics/victorialogs-datasource/releases/download/v0.26.3/victoriametrics-logs-datasource-v0.26.3.zip;victoriametrics-logs-datasource"
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "victoriametrics-logs-datasource"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      lakehouse-logs:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy

volumes:
  vl-data: {}
  lakehouse-cache-logs: {}
  lakehouse-cache-traces: {}
  grafana-data: {}
