auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  path_prefix: /data/loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /data/loki/tsdb-index
    cache_location: /data/loki/tsdb-cache
  aws:
    s3: http://minioadmin:minioadmin@minio:9000/loki-data
    s3forcepathstyle: true

ingester:
  chunk_encoding: snappy
  chunk_idle_period: 30s
  chunk_block_size: 262144
  chunk_retain_period: 1m
  max_transfer_retries: 0
  wal:
    dir: /data/loki/wal

querier:
  max_concurrent: 64
  engine:
    timeout: 5m

query_range:
  parallelise_shardable_queries: true
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 2048
        ttl: 24h

frontend:
  max_outstanding_per_tenant: 4096
  compress_responses: true

limits_config:
  ingestion_rate_mb: 100
  ingestion_burst_size_mb: 200
  max_query_parallelism: 64
  max_global_streams_per_user: 100000
  reject_old_samples: false
  reject_old_samples_max_age: 744h

chunk_store_config:
  chunk_cache_config:
    embedded_cache:
      enabled: true
      max_size_mb: 1024
      ttl: 24h

compactor:
  working_directory: /data/loki/compactor
