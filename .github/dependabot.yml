version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    labels:
      - "dependencies"
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /lakehouse-traces
    schedule:
      interval: weekly
    labels:
      - "dependencies"
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - "ci"
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels:
      - "dependencies"
