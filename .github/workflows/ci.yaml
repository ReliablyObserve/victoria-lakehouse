name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  VL_VERSION_LOGS: v1.50.0
  VL_COMMIT_TRACES: 77df0c04d532
  VT_VERSION: v0.9.2
  GOWORK: "off"

jobs:
  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Single source of truth for which patches get applied: the
      # Makefile. The inline git-apply blocks we used to have here
      # silently drifted every time a new patch landed — Makefile
      # got the patch, ci.yaml didn't, the next PR's test-traces job
      # failed at `undefined: opentelemetry.FormatSeverity` even
      # though everything passed locally. Delegating to make keeps
      # the patch list in one place. cache key already includes
      # `hashFiles('patches/**', 'Makefile')` so the cache invalidates whenever
      # a patch changes.
      - name: Prepare VL deps (logs)
        run: make deps-logs

      - name: Prepare VL deps (traces)
        run: make deps-traces

      - name: Prepare VT deps (traces)
        run: make deps-vt

      - uses: actions/cache/save@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**', 'Makefile') }}

  # Guards the binaries-vs-Helm config surface: every yaml-tagged key in
  # internal/config (shared by the logs AND traces binaries) must be documented
  # in charts/.../values.yaml AND enumerated in values.schema.json, or
  # consciously grandfathered in scripts/ci/helm-drift-allowlist.txt.
  # A new config key without chart coverage FAILS here with instructions.
  helm-config-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check Helm config drift
        run: go run ./scripts/ci/helmdrift

  test-logs:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**', 'Makefile') }}

      - name: Check gofmt -s (logs)
        run: |
          DIFF=$(gofmt -s -l cmd/ internal/)
          if [ -n "$DIFF" ]; then
            echo "::error::gofmt -s required on: $DIFF"
            exit 1
          fi

      - name: Test logs module
        run: go test ./internal/... -race -count=1 -timeout=10m

      - name: Coverage check (logs)
        run: |
          THRESHOLD=90
          FAILED=0
          while IFS= read -r line; do
            pkg=$(echo "$line" | grep -oP '/internal/\K[^/\s]+' | head -1)
            [ -z "$pkg" ] && continue
            case "$pkg" in testutil|storage) continue ;; esac
            pct=$(echo "$line" | grep -oP '([0-9.]+)%' | head -1 | tr -d '%')
            [ -z "$pct" ] && continue
            below=$(awk "BEGIN{print ($pct < $THRESHOLD)}")
            if [ "$below" -eq 1 ]; then
              echo "::error::Coverage for $pkg is ${pct}% (minimum: ${THRESHOLD}%)"
              FAILED=1
            fi
          done < <(go test ./internal/... -cover -count=1 -timeout=10m 2>&1 | grep 'coverage:')
          [ "$FAILED" -eq 1 ] && exit 1 || echo "All packages above ${THRESHOLD}% coverage"

      - name: Vet logs module
        run: go vet ./internal/... ./cmd/...

  test-traces:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: lakehouse-traces/go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**', 'Makefile') }}

      - name: Check gofmt -s (traces)
        working-directory: lakehouse-traces
        run: |
          DIFF=$(gofmt -s -l internal/ *.go)
          if [ -n "$DIFF" ]; then
            echo "::error::gofmt -s required on: $DIFF"
            exit 1
          fi

      - name: Test traces module
        working-directory: lakehouse-traces
        run: go test ./internal/... -race -count=1 -timeout=10m

      - name: Coverage check (traces)
        working-directory: lakehouse-traces
        run: |
          THRESHOLD=90
          FAILED=0
          while IFS= read -r line; do
            pkg=$(echo "$line" | grep -oP '/internal/\K[^/\s]+' | head -1)
            [ -z "$pkg" ] && continue
            case "$pkg" in testutil|storage|vtstorage_adapter|selectapi) continue ;; esac
            pct=$(echo "$line" | grep -oP '([0-9.]+)%' | head -1 | tr -d '%')
            [ -z "$pct" ] && continue
            below=$(awk "BEGIN{print ($pct < $THRESHOLD)}")
            if [ "$below" -eq 1 ]; then
              echo "::error::Coverage for $pkg is ${pct}% (minimum: ${THRESHOLD}%)"
              FAILED=1
            fi
          done < <(go test ./internal/... -cover -count=1 -timeout=10m 2>&1 | grep 'coverage:')
          [ "$FAILED" -eq 1 ] && exit 1 || echo "All packages above ${THRESHOLD}% coverage"

      - name: Vet traces module
        working-directory: lakehouse-traces
        run: go vet ./...

  # Dedicated hot/cold parity safeguard. The same tests already run as
  # part of `test-traces` and `test-logs`, but pulling them into a named
  # job makes the parity check visible in PR pages and gives reviewers
  # a single status icon to look at. When a parity test fires, it's
  # almost always one of the regression classes the cold/hot drilldown
  # has shipped before — cf. issue #99, commit a5576bf, commit be8c126.
  parity-unit:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: lakehouse-traces/go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**', 'Makefile') }}

      - name: Run hot/cold parity tests (traces)
        working-directory: lakehouse-traces
        run: |
          set -o pipefail
          go test ./internal/storage/parquets3/ \
            -run '^(TestColdHotParity|TestFieldEqualityAndStreamFilter)' \
            -race -count=1 -timeout=5m -v 2>&1 | tee parity-traces.txt

      - name: Run VL field-name parity tests (logs)
        run: |
          set -o pipefail
          go test ./internal/storage/parquets3/ \
            -run '^(TestFieldNames_VLParity|TestInsertAndQuery_FieldNameParity)' \
            -race -count=1 -timeout=5m -v 2>&1 | tee parity-logs.txt

      - name: Summarize parity results
        if: always()
        run: |
          echo "## Hot/Cold Parity (Unit)" >> $GITHUB_STEP_SUMMARY
          for f in parity-traces.txt lakehouse-traces/parity-traces.txt parity-logs.txt; do
            [ -f "$f" ] || continue
            label=$(basename "$f" .txt)
            pass=$(grep -c '^--- PASS' "$f" || true)
            fail=$(grep -c '^--- FAIL' "$f" || true)
            skip=$(grep -c '^--- SKIP' "$f" || true)
            echo "- **$label** — passed: $pass, failed: $fail, skipped: $skip" >> $GITHUB_STEP_SUMMARY
            if [ "$fail" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>Failed (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
              echo '' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -B1 -A6 '^--- FAIL' "$f" >> $GITHUB_STEP_SUMMARY || true
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parity-unit-results
          path: |
            lakehouse-traces/parity-traces.txt
            parity-logs.txt

  lint-logs:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**', 'Makefile') }}

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: ./internal/... ./cmd/...
          skip-cache: true

  lint-traces:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: lakehouse-traces/go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**', 'Makefile') }}

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: lakehouse-traces
          # The action's restored analysis cache (keyed off the base branch)
          # goes stale when a PR changes go.sum — staticcheck then loses
          # termination facts for a RANDOM subset of packages and emits
          # nondeterministic SA5011 false positives in guarded t.Fatal test
          # code (different files flagged on each run of the same tree).
          # A cold, deterministic run is worth the extra ~1min.
          skip-cache: true

  build-logs:
    needs: deps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**', 'Makefile') }}

      - name: Build lakehouse-logs
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-s -w -X github.com/VictoriaMetrics/VictoriaMetrics/lib/buildinfo.Version=${{ github.sha }}" \
            -o bin/lakehouse-logs-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/lakehouse-logs

  build-traces:
    needs: deps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: lakehouse-traces/go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**', 'Makefile') }}

      - name: Build lakehouse-traces
        working-directory: lakehouse-traces
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-s -w -X github.com/VictoriaMetrics/VictoriaMetrics/lib/buildinfo.Version=${{ github.sha }}" \
            -o ../bin/lakehouse-traces-${{ matrix.goos }}-${{ matrix.goarch }} \
            .

  docker-logs:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image (logs)
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -f Dockerfile.logs \
            --build-arg VERSION=${{ github.sha }} \
            -t ghcr.io/${REPO}/lakehouse-logs:${{ github.sha }} .

  docker-traces:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image (traces)
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -f Dockerfile.traces \
            --build-arg VERSION=${{ github.sha }} \
            -t ghcr.io/${REPO}/lakehouse-traces:${{ github.sha }} .

  security-logs:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**', 'Makefile') }}

      - name: Run govulncheck (logs)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./internal/... ./cmd/...

  security-traces:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: lakehouse-traces/go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**', 'Makefile') }}

      - name: Run govulncheck (traces)
        working-directory: lakehouse-traces
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint Helm chart
        run: |
          helm lint charts/victoria-lakehouse/ --strict

  benchmarks-logs:
    needs: deps
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**', 'Makefile') }}

      - name: Run benchmarks (logs)
        run: go test -bench=. -benchtime=3s -count=2 ./internal/... | tee bench-logs.txt

      - uses: actions/upload-artifact@v7
        with:
          name: bench-results-logs
          path: bench-logs.txt

  benchmarks-traces:
    needs: deps
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: lakehouse-traces/go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**', 'Makefile') }}

      - name: Run benchmarks (traces)
        working-directory: lakehouse-traces
        run: go test -bench=. -benchtime=3s -count=2 ./internal/... | tee bench-traces.txt

      - uses: actions/upload-artifact@v7
        with:
          name: bench-results-traces
          path: lakehouse-traces/bench-traces.txt
