name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  security-events: write
  contents: read

env:
  VL_VERSION_LOGS: v1.50.0
  VL_COMMIT_TRACES: 77df0c04d532
  VT_VERSION: v0.9.2
  GOWORK: "off"

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Delegate to the Makefile so the patch list stays in one place.
      # Inline git-apply blocks here used to silently drift every time
      # a new VL/VT patch landed in Makefile — see ci.yaml's deps job
      # for the same fix and the rationale.
      - name: Prepare VL deps (logs)
        run: make deps-logs

      - name: Prepare VL deps (traces)
        run: make deps-traces

      - name: Prepare VT deps (traces)
        run: make deps-vt

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build
        run: |
          go build ./cmd/lakehouse-logs/...
          cd lakehouse-traces && go build .

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
