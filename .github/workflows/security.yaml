name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

env:
  VL_VERSION_LOGS: v1.50.0
  VL_COMMIT_TRACES: 77df0c04d532
  VT_VERSION: v0.9.2
  GOWORK: "off"

jobs:
  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Delegate to the Makefile — single source of truth for which
      # patches get applied. The inline blocks here used to drift
      # whenever Makefile got a new patch, silently breaking gosec /
      # govulncheck weeks before anyone looked at the security tab.
      - name: Prepare VL deps (logs)
        run: make deps-logs

      - name: Prepare VL deps (traces)
        run: make deps-traces

      - name: Prepare VT deps (traces)
        run: make deps-vt

      - uses: actions/cache/save@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-security-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**') }}

  govulncheck:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-security-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**') }}

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./internal/... ./cmd/...

  gosec:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaTraces
          key: vl-deps-security-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ env.VT_VERSION }}-${{ hashFiles('patches/**') }}

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude=G110,G115,G304,G401,G501,G705 ./internal/... ./cmd/...

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL

  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.24.3"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --verbose
