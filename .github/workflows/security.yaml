name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

env:
  VL_VERSION_LOGS: v1.50.0
  VL_COMMIT_TRACES: a408207c2242
  GOWORK: "off"

jobs:
  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Clone VL for logs
        run: |
          mkdir -p deps
          git clone --depth 1 --branch ${{ env.VL_VERSION_LOGS }} \
            https://github.com/VictoriaMetrics/VictoriaLogs.git deps/VictoriaLogs

      - name: Apply ExternalStorage patch (logs)
        run: |
          cp patches/vl-logs/external.go deps/VictoriaLogs/app/vlstorage/external.go
          cd deps/VictoriaLogs && git apply ${{ github.workspace }}/patches/vl-logs/vlstorage-dispatch.patch

      - name: Clone VL for traces
        run: |
          mkdir -p lakehouse-traces/deps
          git clone https://github.com/VictoriaMetrics/VictoriaLogs.git /tmp/vl-src
          cd /tmp/vl-src && git checkout ${{ env.VL_COMMIT_TRACES }}
          cp -r /tmp/vl-src ${{ github.workspace }}/lakehouse-traces/deps/VictoriaLogs

      - name: Apply ExternalStorage patch (traces)
        run: |
          cp patches/vl-traces/external.go lakehouse-traces/deps/VictoriaLogs/app/vlstorage/external.go
          cd lakehouse-traces/deps/VictoriaLogs && git apply ${{ github.workspace }}/patches/vl-traces/vlstorage-dispatch.patch

      - uses: actions/cache/save@v4
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
          key: vl-deps-security-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ hashFiles('patches/**') }}

  govulncheck:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache/restore@v4
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
          key: vl-deps-security-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ hashFiles('patches/**') }}

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  gosec:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache/restore@v4
        with:
          path: |
            deps/VictoriaLogs
            lakehouse-traces/deps/VictoriaLogs
          key: vl-deps-security-${{ env.VL_VERSION_LOGS }}-${{ env.VL_COMMIT_TRACES }}-${{ hashFiles('patches/**') }}

      - uses: securego/gosec@master
        with:
          args: -exclude=G110,G115,G304,G401,G501,G705 ./...

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL

  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.24.3"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --verbose
