name: Changelog PR Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changelog-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check changelog
        run: |
          python scripts/ci/check_changelog_pr.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}"

  changelog-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run changelog gate tests
        run: python -m unittest discover -s scripts/ci/tests -v
