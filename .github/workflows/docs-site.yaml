name: docs-site

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/docs-site.yaml
      - website/**
      - docs/**
      - README.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Deploy to docs/ folder
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r website/build/* docs/
          touch docs/.nojekyll

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if [ -n "$(git status --porcelain)" ]; then
            git add docs/
            git commit -m "docs: update website [skip ci]"
            git push
          fi
