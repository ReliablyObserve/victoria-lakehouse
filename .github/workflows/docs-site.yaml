name: docs-site

on:
  pull_request:
    paths:
      - .github/workflows/docs-site.yaml
      - website/**
      - docs/**
      - README.md
  push:
    branches:
      - main
    paths:
      - .github/workflows/docs-site.yaml
      - website/**
      - docs/**
      - README.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_site_exists: ${{ steps.pages_site.outputs.exists || 'false' }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Detect Pages site
        if: github.event_name != 'pull_request'
        id: pages_site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if curl -fsS \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pages" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"
          {
            echo "### GitHub Pages not enabled"
            echo ""
            echo "Site build succeeded, but deployment was skipped because GitHub Pages is not enabled for this repository."
            echo "Enable GitHub Pages in repository settings and select GitHub Actions as the source, then rerun this workflow."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure Pages
        if: github.event_name != 'pull_request' && steps.pages_site.outputs.exists == 'true'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && steps.pages_site.outputs.exists == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/build

  deploy:
    if: github.event_name != 'pull_request' && needs.build.outputs.pages_site_exists == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
