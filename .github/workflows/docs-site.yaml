name: docs-site

on:
  pull_request:
    paths:
      - .github/workflows/docs-site.yaml
      - website/**
      - docs/**
      - README.md
  push:
    branches:
      - main
    paths:
      - .github/workflows/docs-site.yaml
      - website/**
      - docs/**
      - README.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Deploy to main branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Copy built site to docs folder
          rm -rf docs
          mkdir -p docs
          cp -r website/build/* docs/

          # Create .nojekyll to prevent GitHub from processing Jekyll
          touch docs/.nojekyll

          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Commit and push if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git add docs/
            git commit -m "docs: rebuild website [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
