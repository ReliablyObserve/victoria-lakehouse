name: E2E Kubernetes (kind)

# Real-Kubernetes e2e for the K8sElector. Spins up a single-node `kind`
# cluster, deploys the LH Helm chart with 3 replicas, and exercises the
# 5 risk surfaces from PR #96 Goal 5:
#   1. Helm chart wires SA + Role + RoleBinding with correct verbs
#   2. Lease object visible via `kubectl get lease`
#   3. Failover within LeaseDuration + RenewDeadline (~40s)
#   4. NEGATIVE: deleting the RoleBinding makes leader election fail loudly
#   5. Multi-namespace isolation (two releases, two independent leases)
#
# Estimated CI time: ~4 minutes (cluster up ~30s, helm ~30s, wait-pods ~30s,
# failover ~60s, RBAC negative ~30s, multi-ns ~60s, cleanup ~10s).
#
# Path filter: skipped on PRs that don't touch election code or chart
# templates, so docs-only PRs aren't paying the ~4 min budget.

on:
  pull_request:
    paths:
      - 'internal/election/**'
      - 'charts/victoria-lakehouse/**'
      - 'cmd/lakehouse-logs/**'
      - 'lakehouse-traces/main.go'
      - 'tests/e2e-k8s/**'
      - 'Dockerfile.logs'
      - 'Dockerfile.traces'
      - '.github/workflows/e2e-k8s.yaml'
  push:
    branches: [main]
    paths:
      - 'internal/election/**'
      - 'charts/victoria-lakehouse/**'
      - 'cmd/lakehouse-logs/**'
      - 'lakehouse-traces/main.go'
      - 'tests/e2e-k8s/**'
      - 'Dockerfile.logs'
      - 'Dockerfile.traces'
      - '.github/workflows/e2e-k8s.yaml'

permissions:
  contents: read

env:
  GOWORK: "off"
  VL_VERSION_LOGS: "v1.50.0"
  VT_VERSION: "v0.9.0"
  IMAGE: "victoria-lakehouse-lakehouse-logs:e2e-k8s"

jobs:
  leader-election-kind:
    name: Leader election (kind k8s ${{ matrix.k8s-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      # Don't cancel sibling matrix runs — we want both versions' results
      # in the same PR so reviewers can see version-specific failures.
      fail-fast: false
      matrix:
        # PR #98 Item 10: run against at least two K8s versions to catch
        # version-specific apiserver behaviour changes (CAS semantics, lease
        # status fields, RBAC evaluation order, etc).
        #
        # Pinned to specific patches so this build is reproducible. Bump
        # both pins together when the lakehouse moves its k8s.io/* deps.
        # Image SHAs come from https://hub.docker.com/r/kindest/node/tags.
        include:
          - k8s-version: "v1.29.14"
            node-image: "kindest/node:v1.29.14"
          - k8s-version: "v1.32.5"
            node-image: "kindest/node:v1.32.5"
    env:
      KIND_NODE_IMAGE: ${{ matrix.node-image }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -fsSL -o /tmp/kind \
            https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
          chmod +x /tmp/kind
          sudo mv /tmp/kind /usr/local/bin/kind
          kind version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.34.0'

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.18.3'

      - name: Clone VL/VT deps (for build)
        run: |
          mkdir -p deps
          git clone --depth 1 --branch ${{ env.VL_VERSION_LOGS }} \
            https://github.com/VictoriaMetrics/VictoriaLogs.git deps/VictoriaLogs
          cp patches/vl-logs/external.go.src deps/VictoriaLogs/app/vlstorage/external.go
          cp patches/vl-logs/external_query.go.src deps/VictoriaLogs/lib/logstorage/external_query.go
          cd deps/VictoriaLogs && git apply ${{ github.workspace }}/patches/vl-logs/vlstorage-dispatch.patch

      - name: Build lakehouse-logs image
        run: |
          docker build -f Dockerfile.logs -t "$IMAGE" .

      - name: Helm lint chart
        run: |
          helm lint charts/victoria-lakehouse

      - name: Run leader-election e2e (5 sections + items 6/7/8 from PR #98)
        run: |
          export IMAGE
          bash tests/e2e-k8s/test_leader_election.sh

      - name: Run token-rotation e2e (PR #98 Item 1)
        run: |
          export IMAGE
          # Reuse the kind cluster from the previous step? No — each script
          # creates+deletes its own cluster (SKIP_KIND_CREATE=0). This is
          # intentional: the negative-control patches in test_no_sa_token
          # leave the cluster in a state we don't want to bleed across.
          # Total per-matrix-row cost: ~3 e2e × ~4 min each = ~12 min;
          # within the 25 min job timeout.
          bash tests/e2e-k8s/test_token_rotation.sh

      - name: Run no-SA-token e2e (PR #98 Item 4)
        run: |
          export IMAGE
          bash tests/e2e-k8s/test_no_sa_token.sh

      - name: Run helm-upgrade e2e (PR #98 Item 9)
        run: |
          export IMAGE
          bash tests/e2e-k8s/test_helm_upgrade.sh

      - name: Dump cluster state on failure
        if: failure()
        run: |
          echo '=== kubectl get all -A ==='
          kubectl get all -A || true
          echo '=== kubectl get lease -A ==='
          kubectl get lease -A || true
          echo '=== kubectl get rolebinding -A ==='
          kubectl get rolebinding -A || true
          echo '=== insert pod logs ==='
          for ns in lh-test-1 lh-test-2 lh-tokrot lh-sa-good lh-sa-bad lh-upg; do
            for p in $(kubectl get pods -n "$ns" -l app.kubernetes.io/component=logs-insert -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              echo "--- $ns / $p ---"
              kubectl logs -n "$ns" "$p" --tail=200 || true
            done
          done
