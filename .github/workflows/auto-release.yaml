name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  GOWORK: "off"
  VT_VERSION: "v0.9.2"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check skip release
        id: skip_release
        run: |
          TITLE=$(echo "$COMMIT_MSG" | head -1)
          if echo "$TITLE" | grep -q '\[skip release\]'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping: title contains [skip release]"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - uses: actions/checkout@v6
        if: steps.skip_release.outputs.skip != 'true'
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN_GITHUB || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        if: steps.skip_release.outputs.skip != 'true'
        with:
          go-version-file: go.mod

      - name: Determine version bump
        if: steps.skip_release.outputs.skip != 'true'
        id: version
        run: |
          # `git describe` walks the commit graph from HEAD, so its
          # "latest tag" is the closest reachable tag — not the
          # highest version number in the global tag space. After
          # release-history drift (e.g. somebody cuts a minor early,
          # then patch releases on the older line) that can compute
          # a NEXT we've already published. Use the global tag list
          # sorted by version to avoid the v0.38.0-already-exists
          # failure mode this workflow hit on PR #122.
          git fetch --tags --force --quiet origin || true
          LATEST_TAG=$(git tag -l 'v[0-9]*' \
                        | sort -V \
                        | tail -1)
          LATEST_TAG=${LATEST_TAG:-v0.0.0}
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          # Parse PR number from the merge commit subject.
          PR_NUM=$(echo "$COMMIT_MSG" | head -1 | grep -oP '#\K[0-9]+' | head -1 || true)

          # Pull PR size signals so big PRs auto-promote to a
          # bigger version bump even when the operator forgets the
          # label. additions+deletions and file count cover both
          # shapes — a few-file refactor and a many-files surface
          # change both look "big" by one metric.
          PR_TOTAL=0
          PR_FILES=0
          if [ -n "$PR_NUM" ]; then
            STATS=$(gh pr view "$PR_NUM" --json additions,deletions,files \
                      --jq '"\(.additions + .deletions) \(.files | length)"' \
                      2>/dev/null || echo "0 0")
            read -r PR_TOTAL PR_FILES <<< "$STATS"
          fi

          # Bump classes:
          #   major:  X.0.0   — breaking, label-gated only
          #   xl:     0.+10.0 — huge PR (size + label override).
          #                     Bumping minor by 10 makes the
          #                     "tens digit" denote eras of large
          #                     surface work, leaving plenty of
          #                     room for normal minor bumps in
          #                     between.
          #   minor:  0.+1.0  — normal feature
          #   patch:  0.0.+1  — fix / perf / docs / small change
          BUMP="patch"

          if [ -n "$PR_NUM" ]; then
            LABELS=$(gh pr view "$PR_NUM" --json labels --jq '.labels[].name' 2>/dev/null || true)
            if echo "$LABELS" | grep -qE "release:major|breaking-change"; then
              BUMP="major"
            elif echo "$LABELS" | grep -qE "release:xl|epic"; then
              BUMP="xl"
            elif echo "$LABELS" | grep -qE "release:minor|feature"; then
              BUMP="minor"
            elif echo "$LABELS" | grep -qE "release:patch|bugfix|performance"; then
              BUMP="patch"
            fi
          fi

          # Conventional-commit + size-based fallback. Only kicks
          # in when the label gate didn't already classify.
          if [ "$BUMP" = "patch" ]; then
            MSG_FIRST=$(echo "$COMMIT_MSG" | head -1)
            if echo "$MSG_FIRST" | grep -qiE "BREAKING CHANGE|^feat!:"; then
              BUMP="major"
            elif [ "$PR_TOTAL" -gt 5000 ] || [ "$PR_FILES" -gt 50 ]; then
              # XL by size: >5k LOC churn OR >50 files touched.
              # That's the shape of feat/lifecycle-honesty-and-warmup
              # (PR #122), which on the old policy bumped one minor
              # and immediately clobbered v0.38.0.
              BUMP="xl"
            elif echo "$MSG_FIRST" | grep -qiE "^feat(\(|:)"; then
              BUMP="minor"
            fi
          fi

          apply_bump() {
            case "$1" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              xl)    MINOR=$((MINOR + 10)); PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
          }

          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_TAG#v}"
          apply_bump "$BUMP"
          NEXT="v${MAJOR}.${MINOR}.${PATCH}"

          # Clobber guard. If the computed NEXT is already published
          # (release-history drift, manual release in progress,
          # someone retagged), keep applying the same bump kind until
          # we land on a free tag. Patch-bumps walk forward one at a
          # time; xl-bumps walk in steps of 10. Bounded by a 50-step
          # safety cap so a misconfigured workflow can't loop forever.
          for _ in $(seq 1 50); do
            if ! git rev-parse -q --verify "refs/tags/$NEXT" >/dev/null 2>&1; then
              break
            fi
            echo "Tag $NEXT already exists; bumping again"
            apply_bump "$BUMP"
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          done

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "pr_total=$PR_TOTAL" >> $GITHUB_OUTPUT
          echo "pr_files=$PR_FILES" >> $GITHUB_OUTPUT
          echo "Version: $LATEST_TAG → $NEXT  (bump=$BUMP, pr_total=$PR_TOTAL, pr_files=$PR_FILES)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Check for skip conditions
        if: steps.skip_release.outputs.skip != 'true'
        id: skip
        run: |
          # Skip if only non-code files changed (docs, CI, website, release metadata)
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if echo "$CHANGED" | grep -vqE "^(docs/|\.github/|README\.md|CHANGELOG\.md|LICENSE|website/|scripts/ci/|charts/victoria-lakehouse/Chart\.yaml|tests/verification/)"; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping release: only docs/CI/metadata changes"
          fi

      # Delegate to the Makefile — single source of truth for the
      # patch list. See ci.yaml deps job for the drift-prevention
      # rationale. The hard-coded v1.50.0 / 77df0c04d532 above used
      # to drift from the Makefile's VL_VERSION_LOGS / VL_COMMIT_TRACES
      # too; make uses those env vars directly.
      - name: Prepare VL deps (logs)
        if: steps.skip_release.outputs.skip != 'true' && steps.skip.outputs.skip != 'true'
        run: make deps-logs

      - name: Prepare VL deps (traces)
        if: steps.skip_release.outputs.skip != 'true' && steps.skip.outputs.skip != 'true'
        run: make deps-traces

      - name: Prepare VT deps (traces)
        if: steps.skip_release.outputs.skip != 'true' && steps.skip.outputs.skip != 'true'
        run: make deps-vt

      - name: Build binaries
        if: steps.skip_release.outputs.skip != 'true' && steps.skip.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.next }}
          LDFLAGS="-s -w -X github.com/VictoriaMetrics/VictoriaMetrics/lib/buildinfo.Version=${VERSION}"
          mkdir -p dist

          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              echo "Building lakehouse-logs ${GOOS}/${GOARCH}..."
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
                go build -ldflags "$LDFLAGS" \
                -o "dist/lakehouse-logs-${GOOS}-${GOARCH}" ./cmd/lakehouse-logs

              echo "Building lakehouse-traces ${GOOS}/${GOARCH}..."
              cd lakehouse-traces
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
                go build -ldflags "$LDFLAGS" \
                -o "../dist/lakehouse-traces-${GOOS}-${GOARCH}" .
              cd ..
            done
          done

          cd dist && sha256sum lakehouse-* > checksums.txt

      - name: Login to Docker Hub (optional)
        # secrets.* cannot be used directly in `if:` expressions per
        # https://docs.github.com/actions/security-guides/using-secrets-in-github-actions
        # ; we instead gate on an env var that pulls from secrets and is empty
        # when the secret is unset (forks, public CI).
        if: steps.skip_release.outputs.skip != 'true' && steps.skip.outputs.skip != 'true' && env.DOCKERHUB_USERNAME != ''
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          echo "DOCKERHUB_ENABLED=true" >> $GITHUB_ENV

      - name: Build and push Docker images
        if: steps.skip_release.outputs.skip != 'true' && steps.skip.outputs.skip != 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
        run: |
          VERSION=${{ steps.version.outputs.next }}
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          docker buildx create --use

          # We publish two variants per module:
          #   default  -> :vX.Y.Z, :latest
          #   FIPS     -> :vX.Y.Z-fips, :latest-fips
          # Both go to ghcr.io always. Docker Hub mirroring is conditional
          # on the DOCKERHUB_USERNAME secret being set so forks don't fail
          # on missing creds.
          for MODULE in logs traces; do
            for VARIANT in default fips; do
              TAG_SUFFIX=""
              FIPS_ARG="0"
              if [[ "$VARIANT" == "fips" ]]; then
                TAG_SUFFIX="-fips"
                FIPS_ARG="1"
              fi
              GHCR_TAGS="-t ghcr.io/${REPO}/lakehouse-${MODULE}:${VERSION}${TAG_SUFFIX} \
                         -t ghcr.io/${REPO}/lakehouse-${MODULE}:latest${TAG_SUFFIX}"
              HUB_TAGS=""
              if [[ "${DOCKERHUB_ENABLED:-false}" == "true" && -n "$DOCKERHUB_USERNAME" ]]; then
                # Use a configurable Docker Hub namespace (must match the
                # secret's owner). Default to "reliablyobserve" if unset.
                HUB_OWNER="${DOCKERHUB_NAMESPACE:-reliablyobserve}"
                HUB_TAGS="-t docker.io/${HUB_OWNER}/lakehouse-${MODULE}:${VERSION}${TAG_SUFFIX} \
                          -t docker.io/${HUB_OWNER}/lakehouse-${MODULE}:latest${TAG_SUFFIX}"
              fi
              echo "Building lakehouse-${MODULE} variant=${VARIANT} fips=${FIPS_ARG}..."
              # zstd compression on image layers + OCI media types so
              # registries serve the smaller streamed payload to clients.
              # compression-level=3 is the GHA-runner-friendly default
              # (~3% larger than -7 at ~5x the encode speed).
              docker buildx build \
                --platform linux/amd64,linux/arm64 \
                -f Dockerfile.${MODULE} \
                --build-arg VERSION=${VERSION} \
                --build-arg FIPS=${FIPS_ARG} \
                ${GHCR_TAGS} ${HUB_TAGS} \
                --output type=image,compression=zstd,compression-level=3,oci-mediatypes=true,push=true \
                .
            done
          done

      - name: Package Helm chart
        if: steps.skip_release.outputs.skip != 'true' && steps.skip.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.next }}
          # Update Chart.yaml version
          sed -i "s/^version:.*/version: ${VERSION#v}/" charts/victoria-lakehouse/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION#v}\"/" charts/victoria-lakehouse/Chart.yaml
          helm package charts/victoria-lakehouse/ -d dist/

      - name: Create release
        if: steps.skip_release.outputs.skip != 'true' && steps.skip.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.next }}
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          git tag "$VERSION"
          git push origin "$VERSION"

          # Extract changelog section for release notes
          NOTES=$(bash scripts/ci/extract_changelog_section.sh "${VERSION#v}" 2>/dev/null || echo "")

          cat > /tmp/release-notes.md <<EOF
          ## Release Artifacts

          ### Binaries
          | Binary | Platform | File |
          |--------|----------|------|
          | **lakehouse-logs** | Linux amd64 | \`lakehouse-logs-linux-amd64\` |
          | **lakehouse-logs** | Linux arm64 | \`lakehouse-logs-linux-arm64\` |
          | **lakehouse-logs** | macOS amd64 | \`lakehouse-logs-darwin-amd64\` |
          | **lakehouse-logs** | macOS arm64 | \`lakehouse-logs-darwin-arm64\` |
          | **lakehouse-traces** | Linux amd64 | \`lakehouse-traces-linux-amd64\` |
          | **lakehouse-traces** | Linux arm64 | \`lakehouse-traces-linux-arm64\` |
          | **lakehouse-traces** | macOS amd64 | \`lakehouse-traces-darwin-amd64\` |
          | **lakehouse-traces** | macOS arm64 | \`lakehouse-traces-darwin-arm64\` |

          ### Docker Images
          \`\`\`bash
          # Default (non-FIPS) variants
          docker pull ghcr.io/${REPO}/lakehouse-logs:${VERSION}
          docker pull ghcr.io/${REPO}/lakehouse-traces:${VERSION}

          # FIPS 140-3 variants (Go native; requires GODEBUG=fips140=on at runtime)
          docker pull ghcr.io/${REPO}/lakehouse-logs:${VERSION}-fips
          docker pull ghcr.io/${REPO}/lakehouse-traces:${VERSION}-fips
          \`\`\`

          Variants are also published to Docker Hub when the
          \`DOCKERHUB_USERNAME\` secret is configured: \`docker.io/reliablyobserve/lakehouse-{logs,traces}:{tag,tag-fips}\`.

          ### Helm Chart
          \`\`\`bash
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm install lakehouse-logs oci://ghcr.io/\${OWNER}/charts/victoria-lakehouse \\
            --set lakehouseConfig.mode=logs
          helm install lakehouse-traces oci://ghcr.io/\${OWNER}/charts/victoria-lakehouse \\
            --set lakehouseConfig.mode=traces
          \`\`\`

          ${NOTES}
          EOF

          gh release create "$VERSION" dist/* \
            --title "$VERSION" \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to GHCR
        if: steps.skip_release.outputs.skip != 'true' && steps.skip.outputs.skip != 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push dist/victoria-lakehouse-*.tgz oci://ghcr.io/${OWNER}/charts

      - name: Create release metadata PR
        if: steps.skip_release.outputs.skip != 'true' && steps.skip.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.next }}
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          BRANCH="chore/release-metadata-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # 1. Chart.yaml is already updated from the package step — stage it
          git add charts/victoria-lakehouse/Chart.yaml

          # 2. Materialize [Unreleased] → [VERSION] - DATE in CHANGELOG
          bash scripts/ci/materialize_unreleased.sh "${VERSION#v}"
          git add CHANGELOG.md

          # 3. Update appVersion in README badge if present
          sed -i "s/appVersion-[0-9]*\.[0-9]*\.[0-9]*/appVersion-${VERSION#v}/" README.md 2>/dev/null || true
          git add README.md 2>/dev/null || true

          # Extract release notes for PR body
          NOTES=$(bash scripts/ci/extract_changelog_section.sh "${VERSION#v}" 2>/dev/null || echo "See CHANGELOG.md")

          git commit -m "chore: release metadata for ${VERSION} [skip release]"
          git push origin "$BRANCH"

          for ATTEMPT in 1 2 3 4 5; do
            echo "Attempt $ATTEMPT: creating release metadata PR..."
            PR_URL=$(gh pr create \
              --title "chore: release metadata for ${VERSION} [skip release]" \
              --body "$(cat <<EOF
          ## Release ${VERSION}

          Auto-generated after ${VERSION} release. Updates:
          - Chart.yaml version and appVersion → ${VERSION#v}
          - CHANGELOG.md: \`[Unreleased]\` materialized as \`[${VERSION#v}]\`
          - README.md: version badge updated

          ### Images
          - \`ghcr.io/${REPO}/lakehouse-logs:${VERSION}\`
          - \`ghcr.io/${REPO}/lakehouse-traces:${VERSION}\`

          ### Changelog

          ${NOTES}
          EOF
          )" \
              --base main \
              --head "$BRANCH" \
              --label "release:patch" 2>&1) && break
            echo "Attempt $ATTEMPT failed: $PR_URL"
            if [ "$ATTEMPT" -lt 5 ]; then
              DELAY=$((30 * ATTEMPT))
              echo "Retrying in ${DELAY}s..."
              sleep "$DELAY"
            else
              echo "::error::Failed to create release metadata PR after 5 attempts. Branch $BRANCH was pushed — create PR manually."
              exit 1
            fi
          done

          echo "Release metadata PR created: $PR_URL"
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB || secrets.GITHUB_TOKEN }}
