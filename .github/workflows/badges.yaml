name: Badges

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

env:
  VL_VERSION_LOGS: v1.50.0
  VL_COMMIT_TRACES: a408207c2242
  GOWORK: "off"

jobs:
  update:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Clone VL for logs
        run: |
          mkdir -p deps
          git clone --depth 1 --branch ${{ env.VL_VERSION_LOGS }} \
            https://github.com/VictoriaMetrics/VictoriaLogs.git deps/VictoriaLogs

      - name: Apply ExternalStorage patch (logs)
        run: |
          cp patches/vl-logs/external.go.src deps/VictoriaLogs/app/vlstorage/external.go
          cp patches/vl-logs/external_query.go.src deps/VictoriaLogs/lib/logstorage/external_query.go
          cd deps/VictoriaLogs && git apply ${{ github.workspace }}/patches/vl-logs/vlstorage-dispatch.patch

      - name: Clone VL for traces
        run: |
          mkdir -p lakehouse-traces/deps
          git clone https://github.com/VictoriaMetrics/VictoriaLogs.git /tmp/vl-src
          cd /tmp/vl-src && git checkout ${{ env.VL_COMMIT_TRACES }}
          cp -r /tmp/vl-src ${{ github.workspace }}/lakehouse-traces/deps/VictoriaLogs

      - name: Apply ExternalStorage patch (traces)
        run: |
          cp patches/vl-traces/external.go.src lakehouse-traces/deps/VictoriaLogs/app/vlstorage/external.go
          cp patches/vl-traces/external_query.go.src lakehouse-traces/deps/VictoriaLogs/lib/logstorage/external_query.go
          cd lakehouse-traces/deps/VictoriaLogs && git apply ${{ github.workspace }}/patches/vl-traces/vlstorage-dispatch.patch

      - name: Collect metrics
        id: metrics
        run: |
          format_loc() {
            local count=$1
            if [ "$count" -ge 1000 ]; then
              awk "BEGIN {printf \"%.1fk\", $count/1000}"
            else
              echo "$count"
            fi
          }

          # Production code: Go files excluding tests, deps, vendor, generated
          PROD_LOC=$(find . -name '*.go' ! -name '*_test.go' ! -name 'zz_generated*' \
            ! -path './vendor/*' ! -path './.worktrees/*' ! -path './deps/*' \
            ! -path './lakehouse-traces/deps/*' ! -path './patches/*' \
            | xargs wc -l | tail -1 | awk '{print $1}')

          # Test code: only _test.go files, same exclusions
          TEST_LOC=$(find . -name '*_test.go' \
            ! -path './vendor/*' ! -path './.worktrees/*' ! -path './deps/*' \
            ! -path './lakehouse-traces/deps/*' ! -path './patches/*' \
            | xargs wc -l | tail -1 | awk '{print $1}')

          PROD_DISPLAY=$(format_loc "$PROD_LOC")
          TEST_DISPLAY=$(format_loc "$TEST_LOC")

          # Count tests from both modules
          TESTS_LOGS=$(go test -count=1 -v ./internal/... 2>&1 | grep -c '^--- PASS:' || echo "0")
          TESTS_TRACES=$(cd lakehouse-traces && go test -count=1 -v ./internal/... 2>&1 | grep -c '^--- PASS:' || echo "0")
          TOTAL_TESTS=$((TESTS_LOGS + TESTS_TRACES))

          echo "prod_loc=$PROD_DISPLAY" >> "$GITHUB_OUTPUT"
          echo "test_loc=$TEST_DISPLAY" >> "$GITHUB_OUTPUT"
          echo "tests=$TOTAL_TESTS" >> "$GITHUB_OUTPUT"
          echo "Metrics: Prod=$PROD_DISPLAY, Test=$TEST_DISPLAY, Tests=$TOTAL_TESTS"

      - name: Write badge JSON
        run: |
          mkdir -p .badges
          jq -n \
            --arg msg "${{ steps.metrics.outputs.prod_loc }}" \
            '{schemaVersion: 1, label: "prod code", message: $msg, color: "blue"}' \
            > .badges/prod-loc.json

          jq -n \
            --arg msg "${{ steps.metrics.outputs.test_loc }}" \
            '{schemaVersion: 1, label: "test code", message: $msg, color: "orange"}' \
            > .badges/test-loc.json

          jq -n \
            --arg msg "${{ steps.metrics.outputs.tests }} passed" \
            '{schemaVersion: 1, label: "tests", message: $msg, color: "brightgreen"}' \
            > .badges/tests.json

      - name: Push to badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cp -r .badges /tmp/badges-data

          git fetch origin badges 2>/dev/null || true
          if git rev-parse --verify origin/badges >/dev/null 2>&1; then
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rf .
          fi

          cp /tmp/badges-data/* .
          git add prod-loc.json test-loc.json tests.json
          git rm -f loc.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No badge changes"
          else
            git commit -m "update badge data [skip ci]"
            git push origin badges
          fi
