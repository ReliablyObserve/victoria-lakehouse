<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lakehouse Explorer</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--color-background-body, #fefeff);
      color: var(--color-text, #110f0f);
    }
    .lh-page-header {
      padding: 14px 20px;
      border-bottom: 2px solid var(--color-text-disabled, #ccc);
      font-size: 1.15rem; font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="lh-page-header">Victoria Lakehouse — Explorer</div>
  <div id="lh-root"><div style="padding:40px;text-align:center;color:#888">Loading…</div></div>
  <!--
    The dashboard is rendered by the shared module lakehouse-ui.js — THE single
    source of truth, also used by the VMUI-embedded Lakehouse tab (vmui-tab.js).
    Edit the UI there, never here; this page is only a host that mounts it.
  -->
  <script src="lakehouse-ui.js"></script>
  <script>window.LakehouseUI.mount(document.getElementById("lh-root"));</script>
</body>
</html>
