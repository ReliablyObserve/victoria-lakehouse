# tests/parity/docker-compose.yml
#
# Fully internal — no host port mappings. Parity tests run inside the
# parity-net network via the `parity-tests` service, which addresses
# all services by container DNS name.
#
# Local debugging: to expose a port temporarily, run e.g.
#   docker compose port victorialogs 9428
# or override with tests/parity/docker-compose.override.yml.
name: parity

networks:
  parity-net:
    driver: bridge

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    networks: [parity-net]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks: [parity-net]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/parity-bucket --ignore-existing &&
      echo 'MinIO bucket ready'
      "

  victorialogs:
    image: victoriametrics/victoria-logs:v1.50.0
    restart: unless-stopped
    command:
      - "-storageDataPath=/data"
      - "-retentionPeriod=48h"
      - "-loggerLevel=INFO"
    networks: [parity-net]
    volumes:
      - vl-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  lakehouse-logs:
    build:
      context: ../../
      dockerfile: Dockerfile.logs
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks: [parity-net]
    command:
      - "-lakehouse.s3.bucket=parity-bucket"
      - "-lakehouse.s3.endpoint=http://minio:9000"
      - "-lakehouse.s3.access-key=minioadmin"
      - "-lakehouse.s3.secret-key=minioadmin"
      - "-lakehouse.s3.force-path-style=true"
      - "-lakehouse.manifest.refresh-interval=5s"
      - "-lakehouse.insert.flush-interval=5s"
      - "-lakehouse.compaction.interval=15s"
      - "-lakehouse.query.file-workers=64"
      - "-lakehouse.cache.memory-mb=256"
      - "-loggerLevel=INFO"
    healthcheck:
      test: ["CMD", "/usr/local/bin/lakehouse-logs", "healthcheck", "http://localhost:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  victoriatraces:
    image: victoriametrics/victoria-traces:v0.9.2
    command:
      - "-storageDataPath=/data"
      - "-retentionPeriod=48h"
      - "-loggerLevel=INFO"
    networks: [parity-net]
    volumes:
      - vt-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:10428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  lakehouse-traces:
    build:
      context: ../../
      dockerfile: Dockerfile.traces
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks: [parity-net]
    command:
      - "-lakehouse.s3.bucket=parity-bucket"
      - "-lakehouse.s3.endpoint=http://minio:9000"
      - "-lakehouse.s3.access-key=minioadmin"
      - "-lakehouse.s3.secret-key=minioadmin"
      - "-lakehouse.s3.force-path-style=true"
      - "-lakehouse.manifest.refresh-interval=5s"
      - "-lakehouse.insert.flush-interval=5s"
      - "-lakehouse.compaction.interval=15s"
      - "-lakehouse.query.file-workers=64"
      - "-lakehouse.cache.memory-mb=256"
      - "-loggerLevel=INFO"
    healthcheck:
      test: ["CMD", "/usr/local/bin/lakehouse-traces", "healthcheck", "http://localhost:10428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  datagen-seed:
    build:
      context: ../../
      dockerfile: Dockerfile.datagen
    depends_on:
      victorialogs:
        condition: service_healthy
      victoriatraces:
        condition: service_healthy
      lakehouse-logs:
        condition: service_healthy
      lakehouse-traces:
        condition: service_healthy
    networks: [parity-net]
    command:
      - "--logs=10000"
      - "--traces=2000"
      - "--hours-back=24"
      - "--vl-endpoint=http://victorialogs:9428"
      - "--vt-endpoint=http://victoriatraces:10428"
      - "--lh-logs-endpoint=http://lakehouse-logs:9428"
      - "--lh-traces-endpoint=http://lakehouse-traces:10428"

  parity-tests:
    image: golang:1.26.4
    profiles: ["test"]
    depends_on:
      datagen-seed:
        condition: service_completed_successfully
    networks: [parity-net]
    working_dir: /app/tests/parity
    volumes:
      - ../../:/app
      - go-cache:/go
    environment:
      VL_BASE_URL: http://victorialogs:9428
      LH_BASE_URL: http://lakehouse-logs:9428
      VT_BASE_URL: http://victoriatraces:10428
      LHT_BASE_URL: http://lakehouse-traces:10428
      GOWORK: "off"
      GOFLAGS: "-mod=mod"
    command: ["go", "test", "-tags=parity", "-v", "-count=1", "-timeout=10m", "./..."]

volumes:
  vl-data: {}
  vt-data: {}
  go-cache: {}
