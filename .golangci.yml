version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - durationcheck
    - errname
    - gocritic
    - nilerr
    - prealloc
    - unconvert
    - unparam
    - wastedassign

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

output:
  formats:
    text:
      path: stdout

run:
  timeout: 5m
