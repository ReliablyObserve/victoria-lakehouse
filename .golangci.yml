version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - durationcheck
    - errname
    - unconvert
    - wastedassign
    # Go Report Card linters
    - gocyclo
    - misspell
  settings:
    gocyclo:
      min-complexity: 50
    staticcheck:
      checks:
        - "all"
        - "-SA5011"
        - "-ST1000"
        - "-ST1003"
        - "-ST1016"
        - "-ST1020"
        - "-ST1021"
        - "-ST1022"
        - "-ST1023"

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

output:
  formats:
    text:
      path: stdout

run:
  timeout: 5m
