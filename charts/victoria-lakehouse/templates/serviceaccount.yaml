{{- range $signal := list "logs" "traces" }}
{{- $signalVals := index $.Values $signal }}
{{- if $signalVals.enabled }}
{{- range $role := list "select" "insert" }}
{{- $roleVals := index $signalVals $role }}
{{- if and $roleVals.enabled (dig "serviceAccount" "create" true $roleVals) }}
{{- $componentName := printf "%s-%s" $signal $role }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (printf "%s-%s" (include "victoria-lakehouse.fullname" $) $componentName) (dig "serviceAccount" "name" "" $roleVals) }}
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "root" $ "signal" $signal "role" $role) | nindent 4 }}
  {{- with (dig "serviceAccount" "annotations" dict $roleVals) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
