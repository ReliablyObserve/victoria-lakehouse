{{- if and .Values.select.enabled .Values.select.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "victoria-lakehouse.serviceAccountName" (dict "context" . "component" "select" "sa" .Values.select.serviceAccount) }}
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "context" . "component" "select") | nindent 4 }}
  {{- if or .Values.select.serviceAccount.annotations .Values.global.commonAnnotations }}
  annotations:
    {{- with .Values.global.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.select.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if and .Values.insertComponent.enabled .Values.insertComponent.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "victoria-lakehouse.serviceAccountName" (dict "context" . "component" "insert" "sa" .Values.insertComponent.serviceAccount) }}
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "context" . "component" "insert") | nindent 4 }}
  {{- if or .Values.insertComponent.serviceAccount.annotations .Values.global.commonAnnotations }}
  annotations:
    {{- with .Values.global.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.insertComponent.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
