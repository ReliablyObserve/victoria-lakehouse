{{- range $signal := list "logs" "traces" }}
{{- $signalVals := index $.Values $signal }}
{{- if $signalVals.enabled }}
{{- range $role := list "select" "insert" }}
{{- $roleVals := index $signalVals $role }}
{{- if and $roleVals.enabled (dig "horizontalPodAutoscaler" "enabled" false $roleVals) }}
{{- $componentName := printf "%s-%s" $signal $role }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "victoria-lakehouse.fullname" $ }}-{{ $componentName }}
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "root" $ "signal" $signal "role" $role) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "victoria-lakehouse.fullname" $ }}-{{ $componentName }}
  minReplicas: {{ $roleVals.horizontalPodAutoscaler.minReplicas }}
  maxReplicas: {{ $roleVals.horizontalPodAutoscaler.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $roleVals.horizontalPodAutoscaler.targetCPUUtilizationPercentage }}
  {{- with $roleVals.horizontalPodAutoscaler.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
