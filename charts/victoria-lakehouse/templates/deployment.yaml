{{- $port := 9428 }}
{{- if eq .Values.mode "traces" }}
{{- $port = 10428 }}
{{- end }}
{{- if .Values.service.port }}
{{- $port = .Values.service.port }}
{{- end }}
apiVersion: apps/v1
{{- if .Values.cache.disk.enabled }}
kind: StatefulSet
{{- else }}
kind: Deployment
{{- end }}
metadata:
  name: {{ include "victoria-lakehouse.fullname" . }}
  labels:
    {{- include "victoria-lakehouse.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  {{- if .Values.cache.disk.enabled }}
  serviceName: {{ include "victoria-lakehouse.fullname" . }}-headless
  {{- end }}
  selector:
    matchLabels:
      {{- include "victoria-lakehouse.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "victoria-lakehouse.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: lakehouse
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--lakehouse.mode={{ .Values.mode }}"
            - "--lakehouse.s3.bucket={{ .Values.s3.bucket }}"
            - "--lakehouse.s3.region={{ .Values.s3.region }}"
            {{- if .Values.s3.prefix }}
            - "--lakehouse.s3.prefix={{ .Values.s3.prefix }}"
            {{- end }}
            {{- if .Values.s3.endpoint }}
            - "--lakehouse.s3.endpoint={{ .Values.s3.endpoint }}"
            {{- end }}
            {{- if .Values.discovery.headlessService }}
            - "--lakehouse.discovery.headless-service={{ .Values.discovery.headlessService }}"
            {{- end }}
            {{- if .Values.discovery.partitionAuthKey }}
            - "--lakehouse.discovery.partition-auth-key={{ .Values.discovery.partitionAuthKey }}"
            {{- end }}
            {{- if .Values.discovery.peerHeadlessService }}
            - "--lakehouse.discovery.peer-headless-service={{ .Values.discovery.peerHeadlessService }}"
            {{- end }}
            {{- if .Values.hotBoundary }}
            - "--lakehouse.hot-boundary={{ .Values.hotBoundary }}"
            {{- end }}
            - "--lakehouse.cache.memory-limit={{ .Values.cache.memoryLimit }}"
            - "--lakehouse.query.max-concurrent={{ .Values.query.maxConcurrent }}"
          ports:
            - name: http
              containerPort: {{ $port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 60
          startupProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            failureThreshold: 120
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.cache.disk.enabled }}
          volumeMounts:
            - name: cache
              mountPath: /data/lakehouse
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.cache.disk.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: cache
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.cache.disk.storageClass }}
        storageClassName: {{ .Values.cache.disk.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.cache.disk.size }}
  {{- end }}
