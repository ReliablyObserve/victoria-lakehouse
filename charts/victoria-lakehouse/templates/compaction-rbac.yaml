{{- if .Values.lakehouseConfig.compaction.enabled }}
{{- $le := .Values.lakehouseConfig.compaction.leader_election }}
{{- if or (eq $le "auto") (eq $le "k8s") }}
{{- $fullName := include "victoria-lakehouse.fullname" . }}
{{- $ns := .Release.Namespace }}
{{/*
  The compaction loop runs inside the insert statefulset(s) (logs-insert
  and/or traces-insert depending on signals enabled). The leader-election
  k8s.coordination.io/v1 Lease must be writable by THOSE pods' actual
  ServiceAccounts — not a separate compaction SA. We therefore render one
  ServiceAccount + Role + RoleBinding per enabled insert role and bind the
  Role to its insert SA. See:
  - tests/e2e-k8s/test_leader_election.sh
  - internal/election/README.md
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullName }}-compaction-leader
  labels:
    {{- include "victoria-lakehouse.labels" . | nindent 4 }}
rules:
  # Verbs are intentionally broader than the elector's minimum
  # (get / create / update) so that:
  #   - kubectl describe lease works for operators                (list)
  #   - the elector's release-on-stop best-effort patch works     (patch)
  # Tightening these requires updating
  # tests/e2e-k8s/test_leader_election.sh's RBAC negative control.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}-compaction-leader
  labels:
    {{- include "victoria-lakehouse.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}-compaction-leader
subjects:
  {{- range $signal := list "logs" "traces" }}
  {{- $signalVals := index $.Values $signal }}
  {{- if $signalVals.enabled }}
  {{- $insertVals := index $signalVals "insert" }}
  {{- if $insertVals.enabled }}
  - kind: ServiceAccount
    name: {{ default (printf "%s-%s-insert" $fullName $signal) (dig "serviceAccount" "name" "" $insertVals) }}
    namespace: {{ $ns }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
