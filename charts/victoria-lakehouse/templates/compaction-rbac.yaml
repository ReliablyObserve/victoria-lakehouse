{{- if .Values.lakehouseConfig.compaction.enabled }}
{{- $le := .Values.lakehouseConfig.compaction.leader_election }}
{{- if or (eq $le "auto") (eq $le "k8s") }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "victoria-lakehouse.fullname" . }}-compaction
  labels:
    {{- include "victoria-lakehouse.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "victoria-lakehouse.fullname" . }}-compaction-leader
  labels:
    {{- include "victoria-lakehouse.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "victoria-lakehouse.fullname" . }}-compaction-leader
  labels:
    {{- include "victoria-lakehouse.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "victoria-lakehouse.fullname" . }}-compaction-leader
subjects:
  - kind: ServiceAccount
    name: {{ include "victoria-lakehouse.fullname" . }}-compaction
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
