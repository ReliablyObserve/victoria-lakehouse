{{- range $name, $spec := dict "select" $.Values.select "insert" $.Values.insertComponent }}
{{- if and $spec.enabled (dig "podDisruptionBudget" "enabled" false $spec) }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "victoria-lakehouse.fullname" $ }}-{{ $name }}
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "root" $ "component" $name) | nindent 4 }}
spec:
  minAvailable: {{ $spec.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "victoria-lakehouse.componentSelectorLabels" (dict "root" $ "component" $name) | nindent 6 }}
{{- end }}
{{- end }}
