{{- range $name, $spec := dict "select" $.Values.select "insert" $.Values.insertComponent "vmauth" $.Values.vmauth }}
{{- if and $spec.enabled (dig "ingress" "enabled" false $spec) }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "victoria-lakehouse.fullname" $ }}-{{ $name }}
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "root" $ "component" $name) | nindent 4 }}
  {{- with $spec.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $spec.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with $spec.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range $spec.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "victoria-lakehouse.fullname" $ }}-{{ $name }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
