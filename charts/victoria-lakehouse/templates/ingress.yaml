{{- range $signal := list "logs" "traces" }}
{{- $signalVals := index $.Values $signal }}
{{- if $signalVals.enabled }}
{{- range $role := list "select" "insert" }}
{{- $roleVals := index $signalVals $role }}
{{- if and $roleVals.enabled (dig "ingress" "enabled" false $roleVals) }}
{{- $componentName := printf "%s-%s" $signal $role }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "victoria-lakehouse.fullname" $ }}-{{ $componentName }}
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "root" $ "signal" $signal "role" $role) | nindent 4 }}
  {{- with $roleVals.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $roleVals.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with $roleVals.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range $roleVals.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "victoria-lakehouse.fullname" $ }}-{{ $componentName }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- if and $.Values.vmauth.enabled (dig "ingress" "enabled" false $.Values.vmauth) }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "victoria-lakehouse.fullname" $ }}-vmauth
  labels:
    {{- include "victoria-lakehouse.labels" $ | nindent 4 }}
    app.kubernetes.io/component: vmauth
  {{- with $.Values.vmauth.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $.Values.vmauth.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with $.Values.vmauth.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range $.Values.vmauth.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "victoria-lakehouse.fullname" $ }}-vmauth
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
