{{- if and .Values.select.enabled .Values.select.ingress.enabled }}
{{- $fullname := include "victoria-lakehouse.fullname" . }}
{{- $port := include "victoria-lakehouse.port" (dict "context" . "servicePort" .Values.select.service.port) }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-select
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "context" . "component" "select") | nindent 4 }}
  {{- if or .Values.select.ingress.annotations .Values.global.commonAnnotations }}
  annotations:
    {{- with .Values.global.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.select.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.select.ingress.className }}
  ingressClassName: {{ .Values.select.ingress.className }}
  {{- end }}
  {{- if .Values.select.ingress.tls }}
  tls:
    {{- toYaml .Values.select.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.select.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $fullname }}-select
                port:
                  number: {{ $port }}
          {{- end }}
    {{- end }}
{{- end }}
