{{- if .Values.insertComponent.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "victoria-lakehouse.fullname" . }}-insert
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "root" . "component" "insert") | nindent 4 }}
spec:
  replicas: {{ .Values.insertComponent.replicaCount }}
  serviceName: {{ include "victoria-lakehouse.fullname" . }}-insert-headless
  selector:
    matchLabels:
      {{- include "victoria-lakehouse.componentSelectorLabels" (dict "root" . "component" "insert") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.insertComponent.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "victoria-lakehouse.componentSelectorLabels" (dict "root" . "component" "insert") | nindent 8 }}
        {{- with .Values.insertComponent.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ default (printf "%s-insert" (include "victoria-lakehouse.fullname" .)) .Values.insertComponent.serviceAccount.name }}
      terminationGracePeriodSeconds: {{ .Values.insertComponent.terminationGracePeriodSeconds }}
      {{- with (include "victoria-lakehouse.podSecurityContext" (dict "component" .Values.insertComponent "common" .Values.common)) }}
      securityContext:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with .Values.insertComponent.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: insert
          image: {{ include "victoria-lakehouse.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--lakehouse.config=/etc/lakehouse/config.yaml"
            - "--lakehouse.role=insert"
            {{- range $key, $val := .Values.insertComponent.extraArgs }}
            - "--{{ $key }}={{ $val }}"
            {{- end }}
          ports:
            - name: http
              containerPort: {{ include "victoria-lakehouse.servicePort" . }}
              protocol: TCP
          {{- with (include "victoria-lakehouse.securityContext" (dict "component" .Values.insertComponent "common" .Values.common)) }}
          securityContext:
            {{- . | nindent 12 }}
          {{- end }}
          {{- with (include "victoria-lakehouse.resources" (dict "component" .Values.insertComponent "common" .Values.common)) }}
          resources:
            {{- . | nindent 12 }}
          {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          {{- with .Values.insertComponent.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.insertComponent.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/lakehouse
              readOnly: true
            - name: data
              mountPath: /data/lakehouse
            {{- with .Values.insertComponent.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.insertComponent.probe.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.insertComponent.probe.liveness.periodSeconds }}
            failureThreshold: {{ .Values.insertComponent.probe.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.insertComponent.probe.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.insertComponent.probe.readiness.periodSeconds }}
            failureThreshold: {{ .Values.insertComponent.probe.readiness.failureThreshold }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: {{ .Values.insertComponent.probe.startup.periodSeconds }}
            failureThreshold: {{ .Values.insertComponent.probe.startup.failureThreshold }}
        {{- with .Values.insertComponent.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "victoria-lakehouse.fullname" . }}-config
        {{- with .Values.insertComponent.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with (include "victoria-lakehouse.nodeSelector" (dict "component" .Values.insertComponent "common" .Values.common)) }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with (include "victoria-lakehouse.tolerations" (dict "component" .Values.insertComponent "common" .Values.common)) }}
      tolerations:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with (include "victoria-lakehouse.affinity" (dict "component" .Values.insertComponent "common" .Values.common)) }}
      affinity:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with .Values.insertComponent.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.insertComponent.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
  {{- if .Values.insertComponent.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.insertComponent.persistence.accessModes | nindent 10 }}
        {{- with .Values.insertComponent.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.insertComponent.persistence.size }}
  {{- end }}
{{- end }}
