{{- if and .Values.insertComponent.enabled .Values.insertComponent.headlessService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "victoria-lakehouse.fullname" . }}-insert-headless
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "root" . "component" "insert") | nindent 4 }}
  {{- with .Values.insertComponent.headlessService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: {{ include "victoria-lakehouse.servicePort" . }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "victoria-lakehouse.componentSelectorLabels" (dict "root" . "component" "insert") | nindent 4 }}
{{- end }}
