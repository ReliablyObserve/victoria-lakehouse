{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "victoria-lakehouse.fullname" . }}
  labels:
    {{- include "victoria-lakehouse.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "victoria-lakehouse.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        {{- if .Values.logs.enabled }}
        - port: 9428
          protocol: TCP
        {{- end }}
        {{- if .Values.traces.enabled }}
        - port: 10428
          protocol: TCP
        {{- if (dig "jaeger_enabled" false .Values.traces.config) }}
        - port: {{ dig "jaeger_grpc_port" 16685 .Values.traces.config }}
          protocol: TCP
        {{- end }}
        {{- end }}
      {{- if .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      {{- end }}
  egress:
    - ports:
        - port: 443
          protocol: TCP
      to: []
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to: []
    {{- if .Values.networkPolicy.extraEgress }}
    {{- toYaml .Values.networkPolicy.extraEgress | nindent 4 }}
    {{- end }}
{{- end }}
