{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "victoria-lakehouse.fullname" . }}
  labels:
    {{- include "victoria-lakehouse.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "victoria-lakehouse.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ include "victoria-lakehouse.servicePort" . | int }}
          protocol: TCP
      {{- if .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      {{- end }}
  egress:
    - ports:
        - port: 443
          protocol: TCP
      to: []
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to: []
    {{- if .Values.networkPolicy.extraEgress }}
    {{- toYaml .Values.networkPolicy.extraEgress | nindent 4 }}
    {{- end }}
{{- end }}
