{{- if .Values.vmauth.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "victoria-lakehouse.fullname" . }}-vmauth
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "root" . "component" "vmauth") | nindent 4 }}
  {{- with .Values.vmauth.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.vmauth.service.type }}
  ports:
    - name: http
      port: {{ .Values.vmauth.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "victoria-lakehouse.componentSelectorLabels" (dict "root" . "component" "vmauth") | nindent 4 }}
{{- end }}
