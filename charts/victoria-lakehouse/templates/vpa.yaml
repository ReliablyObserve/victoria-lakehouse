{{- range $signal := list "logs" "traces" }}
{{- $signalVals := index $.Values $signal }}
{{- if $signalVals.enabled }}
{{- range $role := list "select" "insert" }}
{{- $roleVals := index $signalVals $role }}
{{- if and $roleVals.enabled (dig "verticalPodAutoscaler" "enabled" false $roleVals) }}
{{- $componentName := printf "%s-%s" $signal $role }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "victoria-lakehouse.fullname" $ }}-{{ $componentName }}
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "root" $ "signal" $signal "role" $role) | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "victoria-lakehouse.fullname" $ }}-{{ $componentName }}
  updatePolicy:
    updateMode: {{ dig "verticalPodAutoscaler" "updateMode" "Off" $roleVals | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
