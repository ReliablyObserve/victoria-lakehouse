{{- range $name, $spec := dict "select" $.Values.select "insert" $.Values.insertComponent }}
{{- if and $spec.enabled (dig "verticalPodAutoscaler" "enabled" false $spec) }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "victoria-lakehouse.fullname" $ }}-{{ $name }}
  labels:
    {{- include "victoria-lakehouse.componentLabels" (dict "root" $ "component" $name) | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "victoria-lakehouse.fullname" $ }}-{{ $name }}
  updatePolicy:
    updateMode: {{ dig "verticalPodAutoscaler" "updateMode" "Off" $spec | quote }}
{{- end }}
{{- end }}
