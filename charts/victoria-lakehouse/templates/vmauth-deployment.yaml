{{- if .Values.vmauth.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "victoria-lakehouse.fullname" . }}-vmauth
  labels:
    {{- include "victoria-lakehouse.genericComponentLabels" (dict "root" . "component" "vmauth") | nindent 4 }}
spec:
  replicas: {{ .Values.vmauth.replicaCount }}
  selector:
    matchLabels:
      {{- include "victoria-lakehouse.genericComponentSelectorLabels" (dict "root" . "component" "vmauth") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/auth: {{ include (print $.Template.BasePath "/vmauth-secret.yaml") . | sha256sum }}
        {{- with .Values.vmauth.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "victoria-lakehouse.genericComponentSelectorLabels" (dict "root" . "component" "vmauth") | nindent 8 }}
        {{- with .Values.vmauth.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.vmauth.terminationGracePeriodSeconds }}
      {{- with .Values.vmauth.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vmauth
          image: "{{ .Values.vmauth.image.repository }}:{{ .Values.vmauth.image.tag }}"
          imagePullPolicy: {{ .Values.vmauth.image.pullPolicy }}
          args:
            - "--auth.config=/etc/vmauth/auth.yml"
            - "--httpListenAddr=:{{ .Values.vmauth.service.port }}"
            {{- range $key, $val := .Values.vmauth.extraArgs }}
            - "--{{ $key }}={{ $val }}"
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.vmauth.service.port }}
              protocol: TCP
          {{- with .Values.vmauth.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.vmauth.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: auth-config
              mountPath: /etc/vmauth
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: auth-config
          secret:
            secretName: {{ include "victoria-lakehouse.fullname" . }}-vmauth
      {{- with .Values.vmauth.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vmauth.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vmauth.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
