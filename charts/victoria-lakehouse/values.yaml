  discovery:
    headless_service: ""
    storage_nodes: []
    partition_auth_key: ""
    peer_headless_service: ""
    refresh_interval: 5m
    timeout: 10s
  peer:
    auth_key: ""
    timeout: 5s
    max_connections: 32
  hot_boundary: ""
  manifest:
    refresh_interval: 5m
    persist_path: /data/lakehouse
    sqs_queue_url: ""
  query:
    max_concurrent: 32
    timeout: 60s
    slow_threshold: 5s
  startup:
    serve_stale: false
    warmup_window: 24h
    max_warmup_time: 5m
  schema:
    extra_promoted: []
  compaction:
    enabled: false
    interval: 5m
    max_concurrent: 1
    min_files_l0: 10
    min_files_l1: 10
    min_age: 1h
    leader_election: auto
  delete:
    enabled: true
    default_mode: auto
    auto_rewrite_classes:
      - STANDARD
    rewrite_delay: 1h
    rewrite_batch_size: 50
    rewrite_max_concurrent: 2
    persist_path: /data/lakehouse/tombstones
    cost_warning_threshold: 10.0
    force_glacier_header: X-Force-Glacier-Delete
    verify_interval: 6h
    lifecycle_rules: []

