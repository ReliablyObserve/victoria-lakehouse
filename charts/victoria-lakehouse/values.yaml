nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []
  commonLabels: {}
  commonAnnotations: {}

image:
  logs:
    repository: ghcr.io/reliablyobserve/lakehouse-logs
  traces:
    repository: ghcr.io/reliablyobserve/lakehouse-traces
  tag: ""
  pullPolicy: IfNotPresent

common:
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

# =============================================================================
# Shared lakehouse configuration
# Applied to all signal modes. Per-signal overrides in logs.config / traces.config.
# All flags available as --lakehouse.<section>.<key> CLI args.
# =============================================================================
lakehouseConfig:
  # -- Configuration profile preset. Sets defaults for all settings below.
  # Any explicit setting overrides the profile value.
  # Options: balanced (default), max-performance, max-durability, max-cost-savings, dev
  # --lakehouse.profile
  profile: ""

  # -- Deployment topology detection mode.
  # --lakehouse.topology
  topology: auto

  # -- Static hot boundary override (e.g., "30d"). Empty = auto-detect from vlstorage.
  # --lakehouse.hot-boundary
  hot_boundary: ""

  # -- pmeta unified partition-metadata layer (field/value catalog + file-meta +
  # bloom facets, persisted as one _pmeta.bundle per partition). Default ON — this
  # is the metadata layer post-consolidation; the legacy per-partition sidecars
  # are no longer written. Disabling is a degraded mode: no catalog/bloom for new
  # files, cold restarts warm from Parquet footers only.
  pmeta:
    # --lakehouse.pmeta.enabled
    enabled: true
    # -- Distinct-values cap per field before it turns high-cardinality
    # (not enumerable; reads fall through to the exact scan). 0 = default 50000.
    # --lakehouse.pmeta.cardinality-threshold
    cardinality_threshold: 0
    # -- Id-like columns to sketch (HLL cardinality) instead of enumerate.
    # trace_id/span_id are the supported taps.
    # --lakehouse.pmeta.always-sketch-fields
    always_sketch_fields: ["trace_id", "span_id"]
    # -- Return empty for always-sketch field_values instead of scanning
    # (matches VL/VT behavior for id columns).
    # --lakehouse.pmeta.refuse-sketch-enumeration
    refuse_sketch_enumeration: false

  # ---------------------------------------------------------------------------
  # S3 — Object storage backend
  # ---------------------------------------------------------------------------
  s3:
    # -- S3 bucket name (required).
    bucket: ""
    # -- AWS region.
    region: us-east-1
    # -- S3 key prefix. Empty = auto-prefix from mode+tenant.
    prefix: ""
    # -- Custom S3 endpoint (e.g., "http://minio:9000" for MinIO).
    endpoint: ""
    # -- S3 access key. Prefer IRSA/IAM roles in production.
    access_key: ""
    # -- S3 secret key.
    secret_key: ""
    # -- Force path-style S3 URLs (required for MinIO).
    force_path_style: false
    # -- Maximum HTTP connections to S3.
    max_connections: 128
    # -- S3 request timeout.
    timeout: 30s
    # -- Maximum retry attempts for failed S3 requests.
    retry_max: 3
    # -- Base delay between retries (exponential backoff).
    retry_base_delay: 200ms
    # -- DEPRECATED: use concurrent_downloads_request/concurrent_downloads_limit
    # (the K8s-style request/limit triple). When the triple is unset this flat
    # value is still honored (request=limit=alias). Removed in v1.0.
    max_concurrent_downloads: 16
    # -- K8s-style request: always-reserved baseline S3 download concurrency.
    # Defaults to limit/4 when only legacy max_concurrent_downloads is set.
    concurrent_downloads_request: 4
    # -- K8s-style limit: hard ceiling on concurrent S3 downloads.
    concurrent_downloads_limit: 16
    # -- K8s-style scaling policy: fixed (default) | linear | expbackoff.
    # Linear and expbackoff are reserved for future signal-driven scaling
    # (queue depth, in-flight pressure); fixed behaves as flat ceiling at limit.
    concurrent_downloads_scaling: fixed
    # -- S3 read-ahead BASE window in bytes (0 = use default 2MB). The window
    # adapts upward on sequential scans — see read_ahead_max_bytes.
    read_ahead_bytes: 0
    # -- Merge S3 range reads with gaps smaller than this in bytes (0 = use
    # default 1MB). BDP-priced: at ~100ms S3 first-byte latency, over-fetching
    # a 1MB gap costs ~10-20ms of transfer but saves a ~100ms round trip.
    coalesce_gap_bytes: 0
    # -- Ceiling for the ADAPTIVE read-ahead window in bytes (0 = use default
    # 8MB). The window doubles from read_ahead_bytes after 2+ consecutive
    # forward-sequential misses (wide scan) and resets on a random seek
    # (needle query). Per-signal tuning: scan-heavy logs deployments benefit
    # from 8-16MB; needle-heavy traces deployments can pin 4MB to bound
    # over-fetch.
    read_ahead_max_bytes: 0
    # -- Waste-feedback threshold for the ADAPTIVE read-ahead window (0 = use
    # default 0.5). When a window is evicted with MORE than this fraction of
    # its bytes never read, the next window HALVES toward read_ahead_bytes
    # instead of growing, and growth resumes only after consecutive efficient
    # windows. Catches sparse forward hops the grow/reset state machine
    # misclassifies as scans (measured 46 MB/query never-read fetch on
    # filtered counts). Values >= 1 disable waste feedback.
    read_ahead_waste_threshold: 0
    # -- Parquet page read buffer for ranged S3 opens in bytes (0 = use
    # default 1MB). parquet-go's own default is 4KB — sized for local disk,
    # far too small for network storage (hundreds of tiny reads per chunk).
    read_buffer_size: 0
    # -- Parquet page read mode on ranged S3 opens: async (default — pages
    # are read ahead by a per-column goroutine, hiding S3 latency behind
    # decode; memory bounded at ~1 page in flight per column reader) or sync
    # (the rollback switch).
    parquet_read_mode: async
    # -- RECOMMENDED bucket lifecycle policy (apply OUT-OF-BAND via aws CLI,
    # Terraform, or your S3 provider's UI — Helm does not create bucket
    # lifecycle rules). Election-free spec §3.2 case 14 + Q5: the orphan
    # sweep relies on the bucket cleaning up incomplete multipart uploads
    # so they never get mistaken for orphan .parquet files.
    #
    #   aws s3api put-bucket-lifecycle-configuration --bucket <name> \
    #     --lifecycle-configuration '{"Rules":[
    #       {"ID":"abort-stale-multipart","Status":"Enabled",
    #        "Filter":{},
    #        "AbortIncompleteMultipartUpload":{"DaysAfterInitiation":1}}]}'
    #
    # Without this policy, fragments from crashed pods sit in S3
    # indefinitely (the AWS SDK aborts them on retry but a SIGKILL
    # prevents the abort call). The compaction Tier B sweep is
    # configured to NEVER touch _multipart/ keys, so this is the only
    # way to clean them.

  # ---------------------------------------------------------------------------
  # Cache — Multi-tier L1 (memory) + L2 (disk) cache
  # ---------------------------------------------------------------------------
  cache:
    # -- DEPRECATED: use memory_request/memory_limit_v2 (the K8s-style triple).
    # Honored as request=limit=alias when triple unset. Removed in v1.0.
    memory_limit: 512MB
    # -- K8s-style request: baseline L1 memory cache size. Defaults to limit/4
    # when only legacy memory_limit is set.
    memory_request: ""
    # -- K8s-style limit: hard ceiling on L1 memory cache.
    memory_limit_v2: ""
    # -- K8s-style scaling policy: fixed | linear | expbackoff.
    memory_scaling: fixed
    # -- L2 disk cache directory path.
    disk_path: /data/lakehouse/cache
    # -- L2 disk cache size limit.
    disk_limit: 50GB
    # -- Disk cache eviction watermark (0.0-1.0).
    eviction_watermark: 0.8
    # -- TTL for cached Parquet file footers.
    footer_ttl: 1h
    # -- TTL for cached bloom filter data.
    bloom_ttl: 1h
    # -- TTL for cached Parquet data pages.
    page_ttl: 10m
    # -- Number of recent hourly partitions to warm on startup (0=disabled).
    warmup_partitions: 0
    # -- Maximum files to warm on startup.
    warmup_max_files: 500
    # -- Maximum concurrent warmup downloads.
    warmup_concurrency: 4
    # -- Cache partition mode: az-local (AZ-scoped ring), global (full ring), distributed.
    partition_mode: az-local

  # ---------------------------------------------------------------------------
  # Insert — Write path (flush to Parquet + S3)
  # ---------------------------------------------------------------------------
  insert:
    # -- Periodic flush interval. Lower = less read delay, more S3 PUTs.
    flush_interval: 30s
    # -- Max rows per partition buffer before triggering flush.
    max_buffer_rows: 50000
    # -- Total buffer memory limit across all partitions.
    max_buffer_bytes: 256MB
    # -- Target Parquet file size before starting a new file.
    target_file_size: 128MB
    # -- Rows per Parquet row group.
    row_group_size: 10000
    # -- Columns to create bloom filters for (point lookup acceleration).
    bloom_columns:
      - service.name
      - trace_id
    # -- ZSTD compression level (1=fast, 22=max compression).
    compression_level: 7
    # -- Insert buffer engine. "buffer" = legacy in-memory staging; "logstore" =
    # durable logstorage-native buffer (on-disk parts, restored on open) — crash
    # recovery WITHOUT a separate WAL. See docs/durability.md.
    buffer_engine: logstore
    # -- Buffer parts directory. MUST be a durable volume (not tmpfs) for crash
    # recovery.
    buffer_dir: /data/lakehouse/buffer
    # -- How long the buffer retains a row before VL drops it. When flush is
    # enabled this is the recovery ceiling (validated >= 4x buffer_flush_interval).
    buffer_retention: 1h

  # ---------------------------------------------------------------------------
  # Select — Read path (buffer query bridge)
  # ---------------------------------------------------------------------------
  select:
    # -- Query insert pods for unflushed data (zero-delay reads).
    buffer_query_enabled: true
    # -- Headless service for discovering insert pods.
    insert_headless_service: ""
    # -- Timeout for buffer query requests to insert pods.
    buffer_query_timeout: 2s
    # -- Enable AZ-aware buffer bridge routing.
    az_aware: true
    # -- Allow cross-AZ fallback for buffer queries.
    cross_az_fallback: true

  # ---------------------------------------------------------------------------
  # Discovery — Hot tier auto-detection and peer fleet discovery
  # ---------------------------------------------------------------------------
  discovery:
    # -- Headless service for VL/VT storage node discovery.
    headless_service: ""
    # -- Static list of VL/VT storage node addresses.
    storage_nodes: []
    # -- Auth key for VL/VT /internal/partition/list endpoint.
    partition_auth_key: ""
    # -- Headless service for peer cache fleet discovery.
    peer_headless_service: ""
    # -- Interval for refreshing storage node list.
    refresh_interval: 5m
    # -- Interval for refreshing peer cache ring membership.
    peer_refresh_interval: 30s
    # -- Timeout for discovery HTTP requests.
    timeout: 10s
    # -- Duration to keep old ring members as shadow set during scaling events.
    # During this period, both old and new ring assignments are honored for lookups.
    ring_stabilize_duration: 60s
    # -- Enable subscriber notifications on ring membership changes.
    ring_change_notify: true

  # ---------------------------------------------------------------------------
  # Peer — Distributed peer cache (L3)
  # ---------------------------------------------------------------------------
  peer:
    # -- Bearer auth key for peer cache HTTP endpoints.
    auth_key: ""
    # -- Timeout for peer cache fetch requests.
    timeout: 5s
    # -- Maximum HTTP connections per peer node.
    max_connections: 32
    # -- Enable AZ-aware routing to prefer same-AZ peers.
    az_aware: true
    # -- AZ routing mode: "preferred" or "strict".
    az_mode: "preferred"
    # -- Allow cross-AZ fallback when same-AZ peers unavailable.
    cross_az_fallback: true
    # -- Environment variable name for AZ override.
    az_env_var: "LAKEHOUSE_AZ"
    # -- Minimum same-AZ peers required in strict mode.
    az_min_peers_per_az: 2

  # ---------------------------------------------------------------------------
  # Manifest — Partition manifest and persistence
  # ---------------------------------------------------------------------------
  manifest:
    # -- Interval for full S3 manifest refresh.
    refresh_interval: 5m
    # -- Directory for manifest and metadata persistence.
    persist_path: /data/lakehouse
    # -- Interval for persisting manifest to disk.
    persist_interval: 5m
    # -- SQS queue URL for near-real-time S3 event manifest updates.
    sqs_queue_url: ""
    # -- AWS region for SQS queue.
    sqs_region: ""
    # -- Long-poll wait time for SQS receive.
    sqs_wait_time: 20s

  # ---------------------------------------------------------------------------
  # Prefetch — Proactive cache warming
  # ---------------------------------------------------------------------------
  prefetch:
    # -- Enable correlated prefetch (logs↔traces via trace_id).
    correlated: true
    # -- Number of partitions to read ahead during sequential scans.
    read_ahead_depth: 2
    # -- Maximum concurrent prefetch downloads.
    max_concurrent: 4
    # -- Maximum pending prefetch tasks in queue.
    max_queue: 64

  # ---------------------------------------------------------------------------
  # Smart Cache — Unified cache controller (L1→L4 orchestration)
  # ---------------------------------------------------------------------------
  smart_cache:
    # -- Maximum age for cached entries before TTL eviction.
    max_age: 24h
    # -- Interval for persisting cache metadata snapshots to disk.
    snapshot_interval: 60s
    # -- Grace period after query completes before unpinning entries.
    query_grace_period: 5m
    # -- Access count threshold within hot_window to classify entry as "hot".
    hot_access_threshold: 3
    # -- Time window for hot access counting.
    hot_window: 10m
    # -- Target hours of query data to keep cached.
    target_hours: 24
    # -- DEPRECATED: use disk_request/disk_limit (the K8s-style triple).
    # Honored as request=limit=alias when triple unset. Removed in v1.0.
    disk_limit_max: 100GB
    # -- K8s-style request: baseline smart-cache disk reservation.
    disk_request: ""
    # -- K8s-style limit: hard ceiling on smart-cache disk.
    disk_limit: ""
    # -- K8s-style scaling policy: fixed | linear | expbackoff.
    disk_scaling: fixed
    # -- Manual ingestion rate hint for sizing (e.g., "100MB"). Empty = auto-detect.
    ingestion_rate_hint: ""

  # ---------------------------------------------------------------------------
  # Cross-Signal — Bidirectional logs↔traces prefetch and eviction
  # ---------------------------------------------------------------------------
  cross_signal:
    # -- Enable cross-signal prefetch/eviction between logs and traces instances.
    enabled: false
    # -- Direct endpoint of the other signal's lakehouse instance.
    endpoint: ""
    # -- Headless service for discovering other signal's instances.
    headless_service: ""
    # -- Bearer auth key for cross-signal HTTP endpoints.
    auth_key: ""
    # -- Timeout for cross-signal HTTP requests.
    timeout: 2s
    # -- Maximum trace IDs per cross-signal batch.
    max_batch: 100
    # -- Batching interval for cross-signal hints.
    batch_interval: 500ms

  # ---------------------------------------------------------------------------
  # Shutdown — Graceful shutdown behavior (coupled with K8s terminationGracePeriodSeconds)
  # ---------------------------------------------------------------------------
  shutdown:
    # -- Delay before starting HTTP server shutdown (allows LB to drain).
    # Maps to -http.shutdownDelay flag. Must be < terminationGracePeriodSeconds - 40s.
    delay: 5s
    # -- Maximum time for in-flight HTTP requests to complete.
    # Maps to -http.maxGracefulShutdownDuration flag.
    max_graceful_duration: 7s
    # -- Timeout for flushing buffered data to S3 during shutdown.
    flush_timeout: 15s
    # -- Timeout for persisting manifest/cache/stats snapshots during shutdown.
    persist_timeout: 10s
    # -- Timeout for releasing leader lease and notifying peers during shutdown.
    release_timeout: 5s

  # ---------------------------------------------------------------------------
  # Query — Read path limits and parallelism
  # ---------------------------------------------------------------------------
  query:
    # -- Maximum concurrent select queries (HTTP 429 when exceeded).
    max_concurrent: 32
    # -- Query execution timeout.
    timeout: 60s
    # -- DEPRECATED: use max_rows_request/max_rows_limit (the K8s-style triple).
    # Honored as request=limit=alias when triple unset. Removed in v1.0.
    max_rows: 10000000
    # -- K8s-style request: operator-visible baseline (informational).
    max_rows_request: 0
    # -- K8s-style limit: hard ceiling on rows per query.
    max_rows_limit: 0
    # -- K8s-style scaling policy: fixed | linear | expbackoff.
    max_rows_scaling: fixed
    # -- Slow query logging threshold.
    slow_threshold: 5s
    # -- DEPRECATED: use file_workers_request/file_workers_limit (the K8s-style triple).
    # Honored as request=limit=alias when triple unset. Removed in v1.0.
    file_workers: 8
    # -- K8s-style request: always-reserved baseline file workers.
    file_workers_request: 0
    # -- K8s-style limit: hard ceiling on file workers.
    file_workers_limit: 0
    # -- K8s-style scaling policy: fixed | linear | expbackoff.
    file_workers_scaling: fixed
    # -- Maximum S3 files a single query may scan (0 = use default 500). Queries exceeding this return an error instead of OOM.
    max_files_per_query: 500

  # ---------------------------------------------------------------------------
  # Startup — Warmup and readiness behavior
  # ---------------------------------------------------------------------------
  startup:
    # -- Serve stale data from disk cache while refreshing from S3.
    serve_stale: false
    # -- Time window of recent partitions to warm on startup.
    warmup_window: 24h
    # -- Maximum time to spend on startup warmup before marking ready.
    max_warmup_time: 5m
    # -- Timeout for peer sync during startup.
    peer_sync_timeout: 30s
    # -- Duration threshold to consider persisted data stale (e.g., after PV reattach).
    stale_threshold: 1h
    # -- Reconcile WAL entries against manifest on stale startup.
    wal_reconciliation: true
    # -- Revalidate cache entries on stale startup.
    cache_revalidation: true
    # -- Maximum time for stale PV resync before marking ready anyway.
    max_resync_time: 2m

  # ---------------------------------------------------------------------------
  # Schema — Parquet column extensibility
  # ---------------------------------------------------------------------------
  schema:
    # -- Additional promoted columns beyond defaults.
    extra_promoted: []

  # ---------------------------------------------------------------------------
  # Circuit Breaker — S3 failure protection
  # ---------------------------------------------------------------------------
  circuit_breaker:
    # -- Number of consecutive failures to open circuit.
    threshold: 5
    # -- Duration circuit stays open before half-open probe.
    timeout: 30s
    # -- Successful probes required to close circuit.
    success_threshold: 2

  # ---------------------------------------------------------------------------
  # Tenant — Multi-tenancy routing and isolation
  # ---------------------------------------------------------------------------
  tenant:
    # -- Static S3 prefix override.
    default_prefix: ""
    # -- S3 prefix template. {AccountID} and {ProjectID} replaced from headers.
    prefix_template: "{AccountID}/{ProjectID}/"
    # -- Tenant isolation mode: "prefix" or "bucket".
    isolation: prefix
    # -- Bucket name template for bucket isolation mode.
    bucket_template: ""
    # -- Default AccountID when no tenant header present.
    default_account: "0"
    # -- Default ProjectID when no tenant header present.
    default_project: "0"
    # -- HTTP header name for AccountID extraction.
    header_account: X-Scope-AccountID
    # -- HTTP header name for ProjectID extraction.
    header_project: X-Scope-ProjectID
    # -- HTTP header name for global (cross-tenant) read access.
    global_read_header: ""
    # -- Required header value for global read access.
    global_read_value: ""
    # -- Bearer token for global read access via Authorization header.
    global_read_token: ""
    # -- Known tenants for bucket-isolation mode.
    known_tenants: []

    # -- HTTP header name for string-based tenant identification (Loki/Tempo compatible).
    # When present, the header value is resolved to AccountID/ProjectID via aliases.
    orgid_header: X-Scope-OrgID
    # -- Prometheus tenant label format: "id" (42:3), "name" (prod-team-eu_staging), "both".
    metrics_format: id
    # -- Auto-register unknown X-Scope-OrgID values as new tenant aliases.
    auto_register: false
    # -- Fleet sync interval for runtime-added aliases.
    alias_sync_interval: 30s
    # -- Static alias mappings: string alias → {account_id, project_id}.
    # Example:
    #   aliases:
    #     prod-team-eu_staging:
    #       account_id: 42
    #       project_id: 3
    #     dev_default:
    #       account_id: 1
    #       project_id: 1
    aliases: {}
    # NOTE (PR A — election-free compaction):
    #   tenant.aliases.leader_election + tenant.aliases.lease_duration removed.
    #   The alias-sync writer migration to HRW ownership is tracked separately;
    #   see spec §10 Q6.

  # ---------------------------------------------------------------------------
  # Compaction — Background Parquet file merging (election-free, HRW-owned)
  # ---------------------------------------------------------------------------
  compaction:
    # -- Enable background compaction. Every pod runs the scheduler; HRW
    #    ownership assigns partitions to exactly one pod (no leader election).
    enabled: true
    # -- Compaction scan interval.
    interval: 5m
    # -- Maximum concurrent compaction workers per pod.
    max_concurrent: 1
    # -- Minimum L0 files in a partition to trigger compaction.
    min_files_l0: 10
    # -- Minimum L1 files in a partition to trigger compaction.
    min_files_l1: 10
    # -- Minimum file age before eligible for compaction.
    min_age: 1h
    # -- Minimum partition age for daily rollup compaction (merges ≥2 L1 files in old partitions).
    daily_rollup_age: 24h
    # -- Progressive zstd compression schedule: slot N = level for output files
    #    at compaction level N (saturates at the last slot; empty list falls back
    #    to insert.compression_level). Default escalates CPU as files age.
    compression_level_by_output_level: [3, 7, 11]
    # -- Parquet row-group size schedule, same slot semantics: slot N = max rows
    #    per row group for output files at compaction level N. Default keeps the
    #    write-path 10k for L0/L1 outputs and doubles to 20k for L2+ rollups
    #    (fewer/larger row groups compress better on cold scan-heavy files).
    #    Empty list falls back to insert.row_group_size.
    row_group_size_by_output_level: [10000, 10000, 20000]
    # NOTE (PR A — election-free compaction):
    #   Removed keys: leader_election, lease_duration, s3_lock_ttl,
    #   s3_heartbeat, shard_id, shard_count. Partition ownership is now
    #   computed via HRW (Highest Random Weight) hashing across the live
    #   peer set; see internal/compaction/ownership.go and spec §2.

  # ---------------------------------------------------------------------------
  # Delete — Cost-aware deletion (tombstone + selective rewrite)
  # ---------------------------------------------------------------------------
  delete:
    # -- Enable delete API endpoints.
    enabled: true
    # -- Default delete mode: "hide", "permanent", "auto".
    default_mode: auto
    # -- Storage classes eligible for active rewrite.
    auto_rewrite_classes:
      - STANDARD
    # -- Delay before rewriting files after tombstone creation.
    rewrite_delay: 1h
    # -- Maximum files per rewrite batch.
    rewrite_batch_size: 50
    # -- Maximum concurrent rewrite workers.
    rewrite_max_concurrent: 2
    # -- Directory for tombstone persistence.
    persist_path: /data/lakehouse/tombstones
    # -- Cost threshold ($) that triggers a warning.
    cost_warning_threshold: 10.0
    # -- HTTP header to force Glacier file deletion.
    force_glacier_header: X-Force-Glacier-Delete
    # -- Interval for continuous deletion verification.
    verify_interval: 6h
    # -- S3 lifecycle rules for delete cost estimation.
    lifecycle_rules: []

  # ---------------------------------------------------------------------------
  # Stats — Tenant statistics, storage class tracking, cost estimation
  # ---------------------------------------------------------------------------
  stats:
    # -- Enable tenant stats collection and fleet sync.
    enabled: true
    # -- Interval for broadcasting tenant stat deltas to peer nodes.
    push_interval: 30s
    # -- ZSTD-compress delta broadcasts.
    push_compression: true
    # -- Interval for persisting full registry snapshot to S3.
    snapshot_interval: 5m
    # -- S3 key prefix for stat snapshots.
    snapshot_prefix: "_meta/tenant-stats"
    # -- Dedicated S3 bucket for metadata (bucket-isolation mode).
    meta_bucket: ""
    # -- Force full sync after N incremental deltas.
    max_delta_count: 1000
    # -- Maximum unique tenant label values in Prometheus metrics.
    metrics_cardinality_limit: 100
    # -- Field cardinality threshold for high-cardinality warnings.
    cardinality_warning_threshold: 10000
    # -- S3 lifecycle rules for zero-cost storage class prediction.
    s3_lifecycle_rules: []
    # -- Per-class pricing in $/GB/month for cost estimation.
    s3_price_per_gb:
      STANDARD: 0.023
      STANDARD_IA: 0.0125
      GLACIER_IR: 0.004
      GLACIER: 0.0036
      DEEP_ARCHIVE: 0.00099
    # -- Per-1000-requests pricing for cost estimation.
    s3_request_prices:
      PUT: 0.005
      GET: 0.0004
      LIST: 0.005
    # -- S3 Inventory source bucket for exact storage class verification.
    s3_inventory_bucket: ""
    # -- Interval for HeadObject spot-checks near lifecycle transitions.
    headobject_sample_interval: 6h
    # -- Maximum HeadObject API calls per refresh cycle.
    headobject_max_per_refresh: 50

  # ---------------------------------------------------------------------------
  # UI — Lakehouse Explorer web interface
  # ---------------------------------------------------------------------------
  ui:
    # -- Serve Lakehouse Explorer at /lakehouse/ui/.
    enabled: true
    # -- Inject "Lakehouse" tab into VL/VT VMUI navigation.
    vmui_tab: true
    # -- Default auto-refresh interval in seconds (0 = off).
    refresh_default: 0
    # -- UI color theme: "auto", "dark", "light".
    theme: auto

# =============================================================================
# Logs signal — VictoriaLogs-compatible lakehouse (port 9428)
# Set logs.enabled=true to deploy logs components.
# =============================================================================
logs:
  # -- Enable logs signal. Deploys logs-select and logs-insert components.
  enabled: true
  # -- Per-signal profile override for logs. Empty = inherit lakehouseConfig.profile.
  profile: ""

  # -- Logs-specific lakehouse configuration (merged with shared lakehouseConfig).
  config:
    # -- Bloom filter columns for logs mode.
    bloom_columns:
      - service.name
    # -- Delete API endpoint prefix for logs mode.
    delete_prefix: /delete/logsql
    # -- VL compatibility version override (empty = latest).
    compat_version: ""

  # -- Logs select component (read path).
  select:
    enabled: true
    # -- Per-role profile override for logs select. Empty = inherit logs.profile.
    profile: ""
    replicaCount: 2
    image: {}
    extraArgs: {}
    extraEnv: []
    extraEnvFrom: []
    extraVolumes: []
    extraVolumeMounts: []
    extraContainers: []
    initContainers: []
