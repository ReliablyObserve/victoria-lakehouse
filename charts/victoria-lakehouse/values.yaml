nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []
  commonLabels: {}
  commonAnnotations: {}

image:
  repository: ghcr.io/reliablyobserve/victoria-lakehouse
  tag: ""
  pullPolicy: IfNotPresent

common:
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

lakehouseConfig:
  mode: logs
  role: all
  s3:
    bucket: ""
    region: us-east-1
    prefix: ""
    endpoint: ""
    access_key: ""
    secret_key: ""
    force_path_style: false
    max_connections: 128
    timeout: 30s
  cache:
    memory_limit: 512MB
    eviction_watermark: 0.8
  insert:
    flush_interval: 10s
    max_buffer_rows: 50000
    max_buffer_bytes: 256MB
    row_group_size: 10000
    target_file_size: 128MB
    bloom_columns: "service.name,trace_id"
    compression_level: default
    wal:
      enabled: true
      dir: /data/lakehouse/wal
      max_bytes: 512MB
  select:
    buffer_query_enabled: true
    insert_headless_service: ""
    buffer_query_timeout: 2s
  discovery:
    headless_service: ""
    storage_nodes: []
    partition_auth_key: ""
    peer_headless_service: ""
    refresh_interval: 5m
    timeout: 10s
  peer:
    auth_key: ""
    timeout: 5s
    max_connections: 32
  hot_boundary: ""
  manifest:
    refresh_interval: 5m
    persist_path: /data/lakehouse
    sqs_queue_url: ""
  query:
    max_concurrent: 32
    timeout: 60s
    slow_threshold: 5s
  startup:
    serve_stale: false
    warmup_window: 24h
    max_warmup_time: 5m
  schema:
    extra_promoted: []
  compaction:
    enabled: false
    interval: 5m
    max_concurrent: 1
    min_files_l0: 10
    min_files_l1: 10
    min_age: 1h
    leader_election: auto

select:
  enabled: true
  replicaCount: 2
  image: {}
  extraArgs: {}
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  extraContainers: []
  initContainers: []
  resources: {}
  podSecurityContext: {}
  securityContext: {}
  service:
    type: ClusterIP
    port: ""
    annotations: {}
    labels: {}
  headlessService:
    enabled: true
    annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  horizontalPodAutoscaler:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  verticalPodAutoscaler:
    enabled: false
    updateMode: "Off"
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  probe:
    liveness:
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 2
      periodSeconds: 5
      failureThreshold: 60
    startup:
      periodSeconds: 5
      failureThreshold: 120
  podAnnotations: {}
  podLabels: {}
  terminationGracePeriodSeconds: 60
  priorityClassName: ""
  topologySpreadConstraints: []

insertComponent:
  enabled: true
  replicaCount: 2
  image: {}
  extraArgs: {}
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  extraContainers: []
  initContainers: []
  resources: {}
  podSecurityContext: {}
  securityContext: {}
  service:
    type: ClusterIP
    port: ""
    annotations: {}
    labels: {}
  headlessService:
    enabled: true
    annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  horizontalPodAutoscaler:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  verticalPodAutoscaler:
    enabled: false
    updateMode: "Off"
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  probe:
    liveness:
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 2
      periodSeconds: 5
      failureThreshold: 60
    startup:
      periodSeconds: 5
      failureThreshold: 120
  podAnnotations: {}
  podLabels: {}
  terminationGracePeriodSeconds: 60
  priorityClassName: ""
  topologySpreadConstraints: []

vmauth:
  enabled: false
  image:
    repository: victoriametrics/vmauth
    tag: v1.106.1
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources: {}
  service:
    type: ClusterIP
    port: 8427
    annotations: {}
    labels: {}
  config: ""
  extraArgs: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
  podAnnotations: {}
  podLabels: {}
  terminationGracePeriodSeconds: 30

extraManifests: []
