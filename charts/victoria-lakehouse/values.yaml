# Traces signal — VictoriaTraces-compatible lakehouse (port 10428)
# Set traces.enabled=true to deploy traces components.
# =============================================================================
traces:
  # -- Enable traces signal. Deploys traces-select and traces-insert components.
  enabled: false
  # -- Per-signal profile override for traces. Empty = inherit lakehouseConfig.profile.
  profile: ""

  # -- Traces-specific lakehouse configuration (merged with shared lakehouseConfig).
  config:
    # -- Bloom filter columns for traces mode.
    bloom_columns:
